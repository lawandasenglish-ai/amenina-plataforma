function renderTeachers(c,a){
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-school"></i><h3>Teachers</h3></div>'
    +'<table class="tbl"><tr><th>Nome</th><th>Alunas</th><th>Retenção</th></tr>'
    +TEACHERS.map(function(t){
      var qtd=ALUNOS.filter(function(a){return a.teacherId===t.id;}).length;
      return '<tr><td class="nm">'+t.nome+'</td><td>'+qtd+'</td><td>'+t.retencao+'%</td></tr>';
    }).join('')+'</table></div>';
}

function renderReunioes(c,a){
  a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openModal(mNovaReuniao())"><i class="ti ti-plus"></i> Nova reunião</button>';
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-calendar-event"></i><h3>Reuniões</h3></div>'
    +(REUNIOES.length?'<table class="tbl"><tr><th>Teacher</th><th>Data</th><th>Hora</th><th>Local</th></tr>'
      +REUNIOES.slice().sort(function(a,b){return b.data.localeCompare(a.data);}).map(function(r){
        var t=TEACHERS.find(function(x){return x.id===r.teacherId;})||{nome:'—'};
        return '<tr><td class="nm">'+t.nome+'</td><td>'+fmtDateBr(r.data)+'</td><td>'+r.hora+'</td><td>'+r.local+'</td></tr>';
      }).join('')+'</table>'
      :'<div style="text-align:center;padding:40px;color:var(--crose)">Nenhuma reunião.</div>')+'</div>';
}

function mNovaReuniao(){
  var tOpts=TEACHERS.map(function(t){return '<option value="'+t.id+'">'+t.nome+'</option>';}).join('');
  return '<div class="mhdr"><h2>Nova reunião</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fgrid"><div class="fg"><label>Teacher</label><select id="re-teacher">'+tOpts+'</select></div>'
    +'<div class="fg"><label>Data</label><input type="date" id="re-data" value="'+new Date().toISOString().split('T')[0]+'"></div></div>'
    +'<div class="fgrid"><div class="fg"><label>Hora</label><input type="time" id="re-hora"></div>'
    +'<div class="fg"><label>Local</label><input id="re-local" placeholder="Ex: Google Meet, presencial..."></div></div>'
    +'<div class="fg"><label>Observações</label><input id="re-obs" placeholder="Pauta..."></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="salvarReuniao()">Salvar</button></div>';
}
function salvarReuniao(){
  var newR={id:uuid(),teacherId:document.getElementById('re-teacher').value,
    data:document.getElementById('re-data').value,hora:document.getElementById('re-hora').value,
    local:document.getElementById('re-local').value,obs:document.getElementById('re-obs').value,criadorNome:S.userName};
  REUNIOES.push(newR);salvarReunioDB(newR);closeModal();showToast('Reunião marcada! ✅');
  renderReunioes(document.getElementById('pc'),document.getElementById('tb-actions'));
}

function renderExtras(c,a){
  a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openModal(mNovaExtra())"><i class="ti ti-plus"></i> Nova aula extra</button>';
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-video"></i><h3>Aulas Extras ('+EXTRAS.length+')</h3></div>'
    +(EXTRAS.length?'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">'
      +EXTRAS.map(function(ex){
        return '<div style="background:rgba(121,20,40,.03);border-radius:10px;padding:14px;border:1px solid rgba(121,20,40,.07)">'
          +'<div style="font-size:13px;font-weight:700;color:var(--cd);margin-bottom:4px">'+ex.titulo+'</div>'
          +'<div style="font-size:11px;color:var(--crose);margin-bottom:6px">'+ex.nivel+' · '+ex.duracao+'</div>'
          +(ex.descricao?'<div style="font-size:12px;color:#555;margin-bottom:8px">'+ex.descricao+'</div>':'')
          +(ex.videoUrl?'<a href="'+ex.videoUrl+'" target="_blank" class="btn btn-ghost btn-sm"><i class="ti ti-video"></i> Assistir</a>':'')
          +'</div>';
      }).join('')+'</div>'
      :'<div style="text-align:center;padding:40px;color:var(--crose)">Nenhuma aula extra.</div>')+'</div>';
}
function mNovaExtra(){
  return '<div class="mhdr"><h2>Nova aula extra</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Título</label><input id="ex-titulo" placeholder="Título da aula"></div>'
    +'<div class="fgrid"><div class="fg"><label>Nível</label><select id="ex-nivel"><option value="Todos">Todos</option><option value="A1">A1</option><option value="A2">A2</option><option value="B1">B1</option><option value="B2">B2</option><option value="C1">C1</option></select></div>'
    +'<div class="fg"><label>Duração</label><input id="ex-dur" placeholder="Ex: 30 min"></div></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Descrição</label><input id="ex-desc" placeholder="Sobre a aula..."></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Link do vídeo</label><input id="ex-url" placeholder="https://..."></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="salvarExtra()">Salvar</button></div>';
}
function salvarExtra(){
  var titulo=(document.getElementById('ex-titulo').value||'').trim();
  if(!titulo){showToast('Preencha o título.');return;}
  var novoExtra={id:uuid(),titulo:titulo,nivel:document.getElementById('ex-nivel').value,
    duracao:document.getElementById('ex-dur').value,descricao:document.getElementById('ex-desc').value,
    videoUrl:document.getElementById('ex-url').value};
  EXTRAS.push(novoExtra);salvarExtraDB(novoExtra);closeModal();showToast('Aula extra adicionada! ✅');
  renderExtras(document.getElementById('pc'),document.getElementById('tb-actions'));
}

function renderMetas(c,a){
  a.innerHTML='<button class="btn btn-ghost btn-sm" onclick="openModal(mEditMetas())"><i class="ti ti-pencil"></i> Editar metas</button>';
  var items=[
    {key:'leads',l:'Leads captados'},
    {key:'matriculas',l:'Matrículas'},
    {key:'aulas_exp',l:'Aulas experimentais'},
    {key:'followups',l:'Follow-ups'},
    {key:'conversao',l:'Taxa de conversão (%)'},
  ];
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-trophy"></i><h3>Metas do mês</h3></div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">'
    +items.map(function(item){
      var m=METAS[item.key]||{meta:0,atual:0};
      var pct=m.meta?Math.min(100,Math.round(m.atual/m.meta*100)):0;
      return '<div style="background:rgba(121,20,40,.03);border-radius:10px;padding:14px;border:1px solid rgba(121,20,40,.07)">'
        +'<div style="font-size:11px;color:var(--crose);font-weight:700;text-transform:uppercase;margin-bottom:6px">'+item.l+'</div>'
        +'<div style="font-size:22px;font-weight:700;color:var(--cd);margin-bottom:4px">'+m.atual+' <span style="font-size:13px;color:var(--crose)">/ '+m.meta+'</span></div>'
        +'<div style="height:6px;background:#eee;border-radius:3px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+(pct>=100?'#2d6a10':pct>=60?'#f39c12':'var(--cr)')+';border-radius:3px"></div></div>'
        +'<div style="font-size:10px;color:var(--crose);margin-top:4px">'+pct+'% da meta</div>'
        +'</div>';
    }).join('')+'</div></div>';
}
function mEditMetas(){
  var items=[{key:'leads',l:'Leads'},{key:'matriculas',l:'Matrículas'},{key:'aulas_exp',l:'Aulas exp.'},{key:'followups',l:'Follow-ups'},{key:'conversao',l:'Conversão %'}];
  return '<div class="mhdr"><h2>Editar metas</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fgrid">'+items.map(function(it){var m=METAS[it.key]||{meta:0,atual:0};return '<div class="fg"><label>'+it.l+' (meta / atual)</label><div style="display:flex;gap:6px"><input type="number" id="mt-'+it.key+'-meta" value="'+m.meta+'" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid rgba(121,20,40,.18);font-family:var(--font-sans)" placeholder="Meta"><input type="number" id="mt-'+it.key+'-atual" value="'+m.atual+'" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid rgba(121,20,40,.18);font-family:var(--font-sans)" placeholder="Atual"></div></div>';}).join('')+'</div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarMetas()">Salvar</button></div>';
}
function salvarMetas(){
  ['leads','matriculas','aulas_exp','followups','conversao'].forEach(function(k){
    var m=parseInt(document.getElementById('mt-'+k+'-meta').value)||0;
    var at=parseInt(document.getElementById('mt-'+k+'-atual').value)||0;
    METAS[k]={meta:m,atual:at};
  });
  closeModal();showToast('Metas atualizadas! ✅');
  renderMetas(document.getElementById('pc'),document.getElementById('tb-actions'));
}
</script>
<script>
// ══════════════════════════════════════════════════════
// NOTAS DA DIRETORIA
// ══════════════════════════════════════════════════════
function renderNotas(c,a){
  a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openModal(mNovaNota())"><i class="ti ti-plus"></i> Nova nota</button>';
  var urgCor={alta:'#fce4ec',media:'#fff3e0',baixa:'#e8f5e9'};
  var urgLabel={alta:'🔴 Alta',media:'🟡 Média',baixa:'🟢 Baixa'};
  var notas=NOTAS.slice().sort(function(a,b){var u={alta:0,media:1,baixa:2};return (u[a.urgencia]||1)-(u[b.urgencia]||1);});
  c.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px">'
    +(notas.length?notas.map(function(n,i){
      return '<div class="nota-card" style="background:'+(urgCor[n.urgencia]||'#f5f5f5')+';opacity:'+(n.resolvido?.6:1)+'">'
        +(n.resolvido?'<div style="display:inline-block;background:#2d6a10;color:#fff;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;margin-bottom:6px">✓ RESOLVIDO</div>':'')
        +'<div style="font-size:15px;font-weight:700;color:var(--cd);margin-bottom:6px">'+n.titulo+'</div>'
        +'<div style="font-size:11px;color:#777;margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap">'
        +'<span>'+urgLabel[n.urgencia||'media']+'</span>'
        +(n.prazo?'<span>📅 Prazo: '+n.prazo+'</span>':'')
        +'<span style="opacity:.7">🕐 '+n.criadoEm+'</span>'
        +'</div>'
        +(n.texto?'<div style="font-size:12px;color:#444;white-space:pre-wrap;line-height:1.6;margin-bottom:12px">'+n.texto+'</div>':'')
        +'<div style="display:flex;justify-content:flex-end;gap:6px">'
        +'<button class="btn btn-ghost btn-sm" data-ni="'+i+'" onclick="toggleResolvida(parseInt(this.dataset.ni))">'+(n.resolvido?'↩ Reabrir':'✓ Resolver')+'</button>'
        +'<button class="btn btn-ghost btn-sm" data-ni="'+i+'" onclick="editarNota(parseInt(this.dataset.ni))"><i class="ti ti-pencil"></i></button>'
        +'<button class="btn btn-ghost btn-sm" style="color:var(--crose)" data-ni="'+i+'" onclick="excluirNota(parseInt(this.dataset.ni))"><i class="ti ti-trash"></i></button>'
        +'</div></div>';
    }).join('')
    :'<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--crose)"><i class="ti ti-notebook" style="font-size:48px;display:block;margin-bottom:12px"></i><div style="font-size:14px;font-weight:600;color:var(--cd)">Nenhuma nota ainda</div></div>')
    +'</div>';
}

function mNovaNota(idx){
  var n=(idx!==undefined&&NOTAS[idx])?NOTAS[idx]:{titulo:'',texto:'',urgencia:'media',prazo:'',resolvido:false};
  window._editNota=idx;
  return '<div class="mhdr"><h2>'+(idx!==undefined?'Editar nota':'Nova nota')+'</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Título</label><input id="nota-titulo" value="'+(n.titulo||'')+'" placeholder="Título da nota..."></div>'
    +'<div class="fgrid"><div class="fg"><label>Urgência</label><select id="nota-urg">'
    +'<option value="alta"'+(n.urgencia==='alta'?' selected':'')+'>🔴 Alta</option>'
    +'<option value="media"'+(n.urgencia==='media'?' selected':'')+'>🟡 Média</option>'
    +'<option value="baixa"'+(n.urgencia==='baixa'?' selected':'')+'>🟢 Baixa</option>'
    +'</select></div>'
    +'<div class="fg"><label>Prazo para resolver</label><input type="date" id="nota-prazo" value="'+(n.prazo||'')+'"></div></div>'
    +'<div class="fg"><label>Conteúdo</label>'
    +'<textarea id="nota-texto" style="width:100%;min-height:120px;padding:12px;border-radius:8px;border:1.5px solid rgba(121,20,40,.18);background:#fff;font-family:var(--font-sans);font-size:13px;color:var(--cd);resize:vertical;outline:none" placeholder="Descreva...">'+(n.texto||'')+'</textarea></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarNota()">Salvar</button></div>';
}

function salvarNota(){
  var titulo=(document.getElementById('nota-titulo').value||'').trim();
  if(!titulo){showToast('Coloque um título!');return;}
  var now=new Date();
  var criadoEm=now.toLocaleDateString('pt-BR')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var prazoEl=document.getElementById('nota-prazo');
  var prazo=prazoEl&&prazoEl.value?new Date(prazoEl.value+'T12:00').toLocaleDateString('pt-BR'):'';
  var urg=(document.getElementById('nota-urg')||{value:'media'}).value;
  var texto=(document.getElementById('nota-texto')||{value:''}).value;
  if(window._editNota!==undefined&&NOTAS[window._editNota]){
    var orig=NOTAS[window._editNota];
    NOTAS[window._editNota]={titulo:titulo,texto:texto,urgencia:urg,prazo:prazo,criadoEm:orig.criadoEm,resolvido:orig.resolvido};
  } else {
    NOTAS.unshift({titulo:titulo,texto:texto,urgencia:urg,prazo:prazo,criadoEm:criadoEm,resolvido:false});
  }
  window._editNota=undefined;
  closeModal();showToast('Nota salva! ✅');
  renderNotas(document.getElementById('pc'),document.getElementById('tb-actions'));
}
function editarNota(i){window._editNota=i;openModal(mNovaNota(i));}
function toggleResolvida(i){if(NOTAS[i]){NOTAS[i].resolvido=!NOTAS[i].resolvido;renderNotas(document.getElementById('pc'),document.getElementById('tb-actions'));}}
function excluirNota(i){if(confirm('Excluir?')){NOTAS.splice(i,1);renderNotas(document.getElementById('pc'),document.getElementById('tb-actions'));}}

// Ao marcar como Atrasado, valor volta ao original (sem desconto)
function marcarFinanceiro(alunaId, status){
  var al=ALUNOS.find(function(a){return a.id===alunaId;});
  if(!al) return;
  al.fin=status;
  if(status==='Atrasado' && al.desconto>0){
    // Volta ao valor cheio
    al.valor=al.valorCheio||al.valor;
    showToast('⚠️ Mensalidade atrasada — desconto removido, valor voltou para R$ '+al.valor);
  }
  salvarAlunaDB(al);
  renderFinanceiro(document.getElementById('pc'),document.getElementById('tb-actions'));
}

// ══════════════════════════════════════════════════════
// TAREFAS (Diretoria + Pedagógico)
// ══════════════════════════════════════════════════════
function renderTarefas(c,a){
  a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openModal(mNovaTarefa())"><i class="ti ti-plus"></i> Nova tarefa</button>';
  if(!TAREFAS.length){
    c.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--crose)"><i class="ti ti-checklist" style="font-size:36px;display:block;margin-bottom:12px"></i>Nenhuma tarefa criada ainda.</div>';
    return;
  }
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-checklist"></i><h3>Tarefas</h3></div>'
    +TAREFAS.map(function(t){
      return '<div style="display:flex;align-items:center;gap:12px;padding:10px;background:rgba(121,20,40,.03);border-radius:9px;margin-bottom:8px;border:1px solid rgba(121,20,40,.07)">'
        +'<div style="flex:1">'
        +'<div style="font-size:13px;font-weight:700;color:var(--cd)">'+t.titulo+'</div>'
        +'<div style="font-size:11px;color:var(--crose);margin-top:2px">'+(t.descricao||'')+(t.prazo?' · Prazo: '+fmtDateBr(t.prazo):'')+'</div>'
        +'</div>'
        +bdg(t.status==='concluido'?'Pago':t.status==='andamento'?'Pendente':'Pendente')
        +'<button class="btn btn-ghost btn-sm" data-tarid="'+t.id+'" onclick="concluirTarefa(this.dataset.tarid)">'+(t.status==='concluido'?'↩':'✓')+'</button></div>';
    }).join('')+'</div>';
}
function mNovaTarefa(){
  return '<div class="mhdr"><h2>Nova tarefa</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Título</label><input id="ta-titulo" placeholder="Descreva a tarefa..."></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Descrição</label><input id="ta-desc" placeholder="Detalhes..."></div>'
    +'<div class="fgrid"><div class="fg"><label>Prioridade</label><select id="ta-prior"><option value="alta">Alta</option><option value="media" selected>Média</option><option value="baixa">Baixa</option></select></div>'
    +'<div class="fg"><label>Prazo</label><input type="date" id="ta-prazo"></div></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="salvarTarefa()">Salvar</button></div>';
}
function salvarTarefa(){
  var titulo=(document.getElementById('ta-titulo').value||'').trim();
  if(!titulo){showToast('Coloque um título.');return;}
  var novaTarefa={id:uuid(),titulo:titulo,descricao:document.getElementById('ta-desc').value||'',
    prioridade:document.getElementById('ta-prior').value,prazo:document.getElementById('ta-prazo').value||'',
    status:'pendente',criadorNome:S.userName};
  TAREFAS.push(novaTarefa);salvarTarefaDB(novaTarefa);closeModal();showToast('Tarefa criada! ✅');
  renderTarefas(document.getElementById('pc'),document.getElementById('tb-actions'));
}
function concluirTarefa(id){
  var t=TAREFAS.find(function(x){return x.id===id;});
  if(t){t.status=t.status==='concluido'?'pendente':'concluido';salvarTarefaDB(t);renderTarefas(document.getElementById('pc'),document.getElementById('tb-actions'));}
}
</script>
<script>
// ══════════════════════════════════════════════════════
// ÁREA DA ALUNA
// ══════════════════════════════════════════════════════
function renderAluTabs(){
  var tabs=[{id:'dashboard',l:'🏠 Início'},{id:'minhas-aulas',l:'📖 Minhas Aulas'},
    {id:'progresso',l:'📊 Progresso'},{id:'materiais',l:'📁 Materiais'},
    {id:'extras',l:'🎬 Aulas Extras'},{id:'financeiro',l:'💰 Financeiro'}];
  var div=document.getElementById('alu-tabs');
  div.innerHTML='';
  tabs.forEach(function(t){
    var btn=document.createElement('button');
    btn.className='alu-tab'+(t.id==='dashboard'?' active':'');
    btn.textContent=t.l;
    btn.dataset.pg=t.id;
    btn.addEventListener('click',function(){goAluPage(this.dataset.pg);});
    div.appendChild(btn);
  });
}

function goAluPage(id){
  document.querySelectorAll('.alu-tab').forEach(function(b){b.classList.toggle('active',b.dataset.pg===id);});
  var c=document.getElementById('alu-pc');
  var pages={dashboard:renderAluDash,'minhas-aulas':renderAluAulas,progresso:renderAluProgresso,
    materiais:renderAluMateriais,extras:renderAluExtras,financeiro:renderAluFinanceiro};
  (pages[id]||function(c){c.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--crose)">Em breve!</div>';})(c);
}

function renderAluDash(c){
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});if(!al) return;
  var mv=motiv();
  var teacher=getTeacher(al.teacherId);
  // Horários da aluna
  var horariosAluna=Object.keys(HORARIOS).filter(function(k){return HORARIOS[k].alunoId===al.id;});
  var horariosHtml='';
  if(horariosAluna.length){
    horariosHtml='<div class="card" style="margin-bottom:14px"><div class="ch"><i class="ti ti-calendar-time"></i><h3>Meus horários de aula</h3></div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:8px">'
      +horariosAluna.map(function(k){
        var p=k.split('_');var dia=p[1];var hora=p[2];
        return '<div style="background:linear-gradient(135deg,var(--cd),var(--cr));border-radius:10px;padding:12px 16px;color:var(--ccream)">'
          +'<div style="font-size:14px;font-weight:700">'+hora+'</div>'
          +'<div style="font-size:11px;opacity:.8">'+fmtDateBr(dia)+'</div>'
          +'</div>';
      }).join('')+'</div></div>';
  }
  c.innerHTML='<div class="alu-hero">'
    +'<div class="alu-hero-welcome">✨ Bem-vinda de volta,</div>'
    +'<div class="alu-hero-name">'+al.nome.split(' ')[0]+'!</div>'
    +'<div class="alu-hero-stats">'
    +'<div><div class="alu-hero-stat-v">'+al.nivel+'</div><div class="alu-hero-stat-l">Nível</div></div>'
    +'<div><div class="alu-hero-stat-v">'+al.freq+'%</div><div class="alu-hero-stat-l">Frequência</div></div>'
    +'<div><div class="alu-hero-stat-v">'+bdg(al.fin)+'</div><div class="alu-hero-stat-l">Pagamento</div></div>'
    +'</div></div>'
    +horariosHtml
    +'<div class="motiv-card"><span class="motiv-emoji">'+mv.emoji+'</span><div class="motiv-txt">"'+mv.txt+'"</div><div class="motiv-sub">'+mv.sub+'</div></div>'
    +'<div class="card"><div class="ch"><i class="ti ti-school"></i><h3>Minha teacher</h3></div>'
    +'<div style="font-size:16px;font-weight:700;color:var(--cd)">'+teacher.nome+'</div>'
    +'<div style="font-size:12px;color:var(--crose);margin-top:4px">'+al.aulasSemana+'x por semana</div></div>';
}

function renderAluAulas(c){
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});if(!al) return;
  var aulas=AULAS.filter(function(r){return r.alunoId===al.id;}).sort(function(a,b){return b.data.localeCompare(a.data);});
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-book"></i><h3>Histórico de aulas</h3></div>'
    +(aulas.length?aulas.map(function(r){
      return '<div style="padding:14px;background:rgba(121,20,40,.03);border-radius:10px;margin-bottom:10px;border:1px solid rgba(121,20,40,.07)">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
        +'<div style="font-weight:700;color:var(--cd)">'+fmtDateBr(r.data)+'</div>'+bdg(r.presenca)+'</div>'
        +(r.conteudo?'<div style="font-size:12px;color:var(--cd);margin-bottom:4px">📖 '+r.conteudo+'</div>':'')
        +(r.desempenho?'<div style="font-size:11px;color:var(--crose)">Desempenho: '+r.desempenho+'</div>':'')
        +(r.homework?'<div style="font-size:11px;color:var(--crose)">Homework: '+r.homework+'</div>':'')
        +'</div>';
    }).join(''):'<div style="text-align:center;padding:40px;color:var(--crose)">Nenhuma aula registrada ainda.</div>')+'</div>';
}

function renderAluProgresso(c){
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});if(!al) return;
  var aulas=AULAS.filter(function(r){return r.alunoId===al.id&&r.presenca==='Presente';}).length;
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-chart-bar"></i><h3>Meu progresso</h3></div>'
    +'<div class="sg g3">'
    +'<div class="sc"><div class="sl">Nível atual</div><div class="sv">'+al.nivel+'</div></div>'
    +'<div class="sc"><div class="sl">Aulas feitas</div><div class="sv">'+aulas+'</div></div>'
    +'<div class="sc"><div class="sl">Frequência</div><div class="sv">'+al.freq+'%</div></div>'
    +'</div></div>';
}

function renderAluMateriais(c){
  c.innerHTML='<div class="card" style="text-align:center;padding:60px;color:var(--crose)"><i class="ti ti-files" style="font-size:48px;display:block;margin-bottom:12px"></i><div style="font-size:14px;color:var(--cd);font-weight:600">Materiais</div><div style="font-size:12px;margin-top:4px">Seus materiais de aula aparecerão aqui em breve!</div></div>';
}

function renderAluExtras(c){
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-video"></i><h3>Aulas Extras</h3></div>'
    +(EXTRAS.length?'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">'
      +EXTRAS.map(function(ex){
        return '<div style="background:rgba(121,20,40,.03);border-radius:10px;padding:14px;border:1px solid rgba(121,20,40,.07)">'
          +'<div style="font-size:13px;font-weight:700;color:var(--cd);margin-bottom:4px">'+ex.titulo+'</div>'
          +'<div style="font-size:11px;color:var(--crose);margin-bottom:6px">'+ex.nivel+' · '+ex.duracao+'</div>'
          +(ex.videoUrl?'<a href="'+ex.videoUrl+'" target="_blank" class="btn btn-primary btn-sm"><i class="ti ti-play"></i> Assistir</a>':'')
          +'</div>';
      }).join('')+'</div>'
      :'<div style="text-align:center;padding:40px;color:var(--crose)">Nenhuma aula extra disponível ainda.</div>')+'</div>';
}

function renderAluFinanceiro(c){
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});if(!al) return;
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-cash"></i><h3>Meu financeiro</h3></div>'
    +'<div class="sg g3">'
    +'<div class="sc"><div class="sl">Plano</div><div class="sv" style="font-size:18px">'+al.plano+'</div></div>'
    +'<div class="sc"><div class="sl">Valor mensal</div><div class="sv" style="font-size:18px">R$ '+al.valor+'</div></div>'
    +'<div class="sc '+(al.fin==='Atrasado'?'warn':al.fin==='Pago'?'ok':'')+'"><div class="sl">Status</div><div style="margin-top:6px">'+bdg(al.fin)+'</div></div>'
    +'</div>'
    +'<div style="font-size:12px;color:var(--crose);padding:10px 0">Vencimento: dia '+al.venc+' de cada mês</div></div>';
}
</script>
