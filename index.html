<title>A Menina que Ensina Inglês — Plataforma</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
/* ══ RELATÓRIOS ══ */
.sg.g4{grid-template-columns:repeat(4,1fr);}
.sc.ok{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);}
canvas{max-height:220px;}
@media print{.sb,.tb-actions{display:none!important;}.pc{margin:0!important;padding:0!important;}}

/* ══ VARIÁVEIS ══ */
:root{
  --cr:#791428;--cd:#461017;--cp:#F7C6D3;--crose:#BC5572;--ccream:#FDFBF6;
  --cbg:#f2ebe7;--ccard:#FDFBF6;
  --font-serif:'DM Serif Display',Georgia,serif;
  --font-sans:'Red Hat Display',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font-sans);background:var(--cbg);color:var(--cd);}
.hidden{display:none!important;}

/* ══ LAYOUT PRINCIPAL ══ */
#screen-app{position:fixed;inset:0;display:flex;}
.sb{width:222px;min-width:222px;background:var(--cd);display:flex;flex-direction:column;height:100%;overflow:hidden;}
.sb-top{padding:16px 14px 12px;border-bottom:1px solid rgba(247,198,211,.08);}
.sb-logo{max-width:130px;display:block;margin-bottom:10px;}
.sb-uw{display:flex;align-items:center;gap:9px;}
.sb-av{width:34px;height:34px;border-radius:50%;background:rgba(247,198,211,.18);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--cp);flex-shrink:0;}
.sb-un{font-size:13px;font-weight:700;color:var(--ccream);}
.sb-rb{font-size:9px;background:rgba(247,198,211,.15);color:var(--cp);padding:2px 7px;border-radius:10px;margin-top:2px;display:inline-block;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.sb-sec{font-size:9px;font-weight:700;color:rgba(247,198,211,.4);padding:10px 16px 3px;text-transform:uppercase;letter-spacing:.08em;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;color:rgba(247,198,211,.65);font-size:12px;font-weight:500;transition:all .12s;}
.ni:hover{background:rgba(247,198,211,.07);color:var(--cp);}
.ni.active{background:rgba(247,198,211,.13);color:var(--ccream);font-weight:700;}
.ni i{font-size:15px;flex-shrink:0;}
.nil{flex:1;}
.nb{background:var(--cr);color:var(--ccream);font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700;margin-left:auto;}
.sb-foot{padding:10px 12px;border-top:1px solid rgba(247,198,211,.07);display:flex;flex-direction:column;gap:6px;}
.sb-switch-btn{width:100%;padding:7px;background:rgba(247,198,211,.1);border:1px solid rgba(247,198,211,.2);border-radius:7px;color:var(--cp);font-size:11px;cursor:pointer;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;}
.sb-switch-btn:hover{background:rgba(247,198,211,.18);}
.sb-out{width:100%;padding:7px;background:transparent;border:1px solid rgba(247,198,211,.15);border-radius:7px;color:rgba(247,198,211,.5);font-size:11px;cursor:pointer;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;}
.sb-out:hover{background:rgba(247,198,211,.07);color:var(--cp);}
.mw{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;background:var(--ccard);border-bottom:1px solid rgba(121,20,40,.06);flex-shrink:0;}
.tb-l{}
.tb-l h1{font-family:var(--font-serif);font-size:20px;color:var(--cd);}
.tbs{font-size:11px;color:var(--crose);margin-top:1px;}
.tb-r{display:flex;gap:8px;align-items:center;}
.pc{flex:1;overflow-y:auto;padding:20px 24px;background:var(--cbg);}
.pc::-webkit-scrollbar{width:4px;}
.pc::-webkit-scrollbar-thumb{background:rgba(121,20,40,.15);border-radius:4px;}

/* ══ COMPONENTES ══ */
.card{background:var(--ccard);border-radius:11px;border:1px solid rgba(121,20,40,.07);padding:18px;margin-bottom:14px;}
.card.warn{border-color:rgba(220,53,69,.2);background:#fff8f8;}
.card.ok{border-color:rgba(45,106,16,.2);background:#f8fff8;}
.ch{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ch h3{font-size:14px;font-weight:700;color:var(--cd);flex:1;}
.ch i{color:var(--cr);font-size:18px;}
.cha{font-size:11px;color:var(--crose);background:none;border:none;cursor:pointer;font-family:var(--font-sans);}
.sg{display:grid;gap:12px;margin-bottom:14px;}
.g2{grid-template-columns:repeat(2,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g4{grid-template-columns:repeat(4,1fr);}
.sc{background:var(--ccard);border-radius:10px;padding:14px 16px;border:1px solid rgba(121,20,40,.07);}
.sc.warn{border-color:rgba(220,53,69,.2);background:#fff8f8;}
.sc.ok{border-color:rgba(45,106,16,.2);}
.sl{font-size:11px;color:var(--crose);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.sv{font-size:26px;font-weight:700;color:var(--cd);font-family:var(--font-serif);}
.ss{font-size:11px;color:var(--crose);margin-top:2px;}

/* ══ BOTÕES ══ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--font-sans);cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--cr);color:var(--ccream);}
.btn-primary:hover{background:var(--cd);}
.btn-ghost{background:transparent;color:var(--crose);border:1px solid rgba(121,20,40,.18);}
.btn-ghost:hover{background:rgba(121,20,40,.05);}
.btn-success{background:#2d6a10;color:#fff;}
.btn-success:hover{background:#1e4a0b;}
.btn-sm{padding:5px 10px;font-size:11px;}

/* ══ TABELA ══ */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:rgba(121,20,40,.04);color:var(--crose);font-size:10px;font-weight:700;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid rgba(121,20,40,.08);}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(121,20,40,.04);color:var(--cd);}
.tbl tr:hover td{background:rgba(121,20,40,.02);}
.tbl .nm{font-weight:600;}
.tbl .act{cursor:pointer;color:var(--crose);}

/* ══ BADGE ══ */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;}
.badge-ok{background:rgba(45,106,16,.1);color:#2d6a10;}
.badge-warn{background:rgba(255,193,7,.15);color:#7a5200;}
.badge-err{background:rgba(220,53,69,.1);color:#c0392b;}
.badge-info{background:rgba(26,79,160,.1);color:#1a4fa0;}
.badge-gray{background:rgba(121,20,40,.07);color:var(--crose);}

/* ══ FORMULÁRIO ══ */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11px;font-weight:700;color:var(--crose);text-transform:uppercase;letter-spacing:.05em;}
.fg input,.fg select,.fg textarea{padding:10px 12px;border-radius:8px;border:1.5px solid rgba(121,20,40,.18);background:#fff;color:var(--cd);font-size:13px;font-family:var(--font-sans);outline:none;transition:border .15s;width:100%;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--cr);}
.fst{font-size:11px;font-weight:700;color:var(--crose);text-transform:uppercase;letter-spacing:.05em;padding:10px 0 6px;border-bottom:1px solid rgba(121,20,40,.07);margin-bottom:12px;}

/* ══ MODAL ══ */
#mo{position:fixed;inset:0;background:rgba(70,16,23,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
#mwrap{background:var(--ccard);border-radius:14px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(70,16,23,.25);}
#mbody{padding:24px;}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.mhdr h2{font-family:var(--font-serif);font-size:20px;color:var(--cd);}
.mclose{background:none;border:none;font-size:20px;cursor:pointer;color:var(--crose);padding:4px;}
.mftr{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(121,20,40,.07);}

/* ══ GRADE DE HORÁRIOS ══ */
.schedule-wrap{overflow-x:auto;}
.schedule-table{border-collapse:collapse;width:100%;font-size:11px;}
.schedule-table th{background:var(--cd);color:var(--ccream);padding:6px 4px;text-align:center;font-size:11px;font-weight:600;border:1px solid rgba(247,198,211,.1);white-space:nowrap;}
.schedule-table td{border:1px solid rgba(121,20,40,.1);padding:0;vertical-align:middle;min-width:90px;height:36px;text-align:center;}
.schedule-table .time-col{background:var(--cd);color:var(--cp);padding:4px 8px;font-size:11px;font-weight:700;text-align:center;white-space:nowrap;width:55px;}
.slot{width:100%;height:100%;padding:4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background .12s;min-height:36px;}
.slot.fixo{background:#e8f4df;}
.slot.flexivel{background:#e8f0fc;}
.slot.reposicao{background:#fef3e0;}
.slot.bloqueado{background:#fceaf0;}
.slot-nome{font-size:11px;font-weight:700;color:var(--cd);line-height:1.2;text-align:center;}
.slot-tipo{font-size:9px;color:var(--crose);text-align:center;}
.slot-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.slot-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--cd);}
.slot-legend-dot{width:12px;height:12px;border-radius:3px;}
.hora-livre{cursor:pointer;transition:all .15s;}
.hora-livre:hover{background:rgba(45,106,16,.2)!important;}
.hora-livre.selecionada{background:rgba(45,106,16,.35)!important;outline:2px solid #2d6a10;}

/* ══ NOTAS DIRETORIA ══ */
.nota-card{border-radius:12px;padding:18px;border:1px solid rgba(0,0,0,.08);margin-bottom:12px;}

/* ══ LOGIN ══ */
#screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--cd) 0%,var(--cr) 100%);}
.login-box{background:var(--ccream);border-radius:16px;padding:36px;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.2);}
.login-logo{max-width:160px;display:block;margin:0 auto 24px;}
.login-tabs{display:flex;gap:0;margin-bottom:24px;border-radius:9px;overflow:hidden;border:1.5px solid rgba(121,20,40,.15);}
.ltab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--crose);background:transparent;border:none;font-family:var(--font-sans);transition:all .15s;}
.ltab.sel{background:var(--cr);color:var(--ccream);}
.perfis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.lp{padding:10px 6px;border-radius:9px;border:1.5px solid rgba(121,20,40,.15);text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--crose);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.lp:hover{border-color:var(--cr);color:var(--cr);}
.lp.sel{border-color:var(--cr);background:rgba(121,20,40,.06);color:var(--cr);}
.lp i{font-size:20px;}
.lerr{color:#c0392b;font-size:12px;margin-top:8px;display:none;}

/* ══ ALUNO APP ══ */
.alu-topbar{background:var(--cd);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.alu-brand{font-family:var(--font-serif);color:var(--cp);font-size:16px;}
.alu-user{display:flex;align-items:center;gap:10px;}
.alu-name{font-size:13px;color:var(--cp);font-weight:600;}
.alu-av{width:32px;height:32px;border-radius:50%;background:rgba(247,198,211,.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--cp);}
.alu-tabs{display:flex;gap:4px;padding:12px 22px;background:var(--ccard);border-bottom:1px solid rgba(121,20,40,.07);overflow-x:auto;}
.alu-tab{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid rgba(121,20,40,.15);color:var(--crose);background:transparent;font-family:var(--font-sans);white-space:nowrap;transition:all .15s;}
.alu-tab.active{background:var(--cr);color:var(--ccream);border-color:var(--cr);}
.alu-pc{flex:1;overflow-y:auto;padding:20px 22px;background:var(--cbg);}
.alu-hero{background:linear-gradient(135deg,var(--cd),var(--cr));border-radius:14px;padding:24px;color:var(--ccream);margin-bottom:16px;}
.alu-hero-welcome{font-size:13px;opacity:.8;margin-bottom:4px;}
.alu-hero-name{font-family:var(--font-serif);font-size:28px;margin-bottom:16px;}
.alu-hero-stats{display:flex;gap:20px;flex-wrap:wrap;}
.alu-hero-stat-v{font-size:20px;font-weight:700;}
.alu-hero-stat-l{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.05em;}
.motiv-card{background:linear-gradient(135deg,rgba(247,198,211,.2),rgba(247,198,211,.05));border:1px solid rgba(247,198,211,.3);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;}
.motiv-emoji{font-size:28px;display:block;margin-bottom:8px;}
.motiv-txt{font-family:var(--font-serif);font-size:16px;color:var(--cd);margin-bottom:4px;}
.motiv-sub{font-size:12px;color:var(--crose);}

/* ══ KANBAN CRM ══ */
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;overflow-x:auto;}
.kb-col{background:rgba(121,20,40,.04);border-radius:10px;padding:10px;}
.kb-hdr{font-size:11px;font-weight:700;color:var(--cd);padding:6px 8px;margin-bottom:8px;border-bottom:2px solid var(--cr);}
.kb-card{background:var(--ccard);border-radius:8px;padding:10px;margin-bottom:6px;border:1px solid rgba(121,20,40,.08);cursor:pointer;transition:all .12s;font-size:12px;}
.kb-card:hover{border-color:var(--cr);transform:translateY(-1px);}
.kb-card .kb-nome{font-weight:700;color:var(--cd);margin-bottom:3px;}
.kb-card .kb-info{font-size:10px;color:var(--crose);}

/* ══ LOGIN REDESIGN ══ */
#screen-login{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#461017 0%,#791428 60%,#BC5572 100%);
  position:relative;
  overflow:hidden;
}
#screen-login::before{
  content:'';
  position:absolute;
  width:600px;height:600px;
  background:rgba(247,198,211,.05);
  border-radius:50%;
  top:-200px;right:-200px;
}
#screen-login::after{
  content:'';
  position:absolute;
  width:400px;height:400px;
  background:rgba(247,198,211,.04);
  border-radius:50%;
  bottom:-150px;left:-100px;
}
.login-box{
  background:rgba(253,251,246,.97);
  border-radius:20px;
  padding:40px 36px;
  width:100%;
  max-width:440px;
  box-shadow:0 32px 80px rgba(0,0,0,.3),0 0 0 1px rgba(247,198,211,.2);
  position:relative;
  z-index:1;
  backdrop-filter:blur(10px);
}
.login-logo-wrap{
  text-align:center;
  margin-bottom:28px;
}
.login-logo{
  max-width:200px;
  max-height:100px;
  object-fit:contain;
  display:block;
  margin:0 auto;
}
.login-tagline{
  font-size:12px;
  color:var(--crose);
  text-align:center;
  margin-top:8px;
  letter-spacing:.05em;
}
.login-divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin:20px 0;
}
.login-divider::before,.login-divider::after{
  content:'';flex:1;height:1px;background:rgba(121,20,40,.12);
}
.login-divider span{font-size:11px;color:var(--crose);font-weight:600;text-transform:uppercase;letter-spacing:.08em;}
</style>
</head>

function normalizarNome(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

async function carregarDados(){
  if(!sb) return;
  try{
    // Carregar teachers PRIMEIRO para o mapa estar pronto quando mapAluno rodar
    var rTe=await sb.from('teachers').select('*');
    if(rTe.data&&rTe.data.length){
      rTe.data.forEach(function(dbT){
        // Match ignorando acentos e maiúsculas (resolve Nínive vs Nivive vs NINIVE)
        var local=TEACHERS.find(function(t){return normalizarNome(t.nome)===normalizarNome(dbT.nome);});

      (async function(){
        for(var i=0;i<TEACHERS.length;i++){ await salvarTeacherDB(TEACHERS[i]); }
      })();

    // Agora carregar o resto em paralelo

// Resolve ID de teacher: converte id local (t0,t1) para UUID do banco
var _teacherIdMap={};
async function resolveTeacherId(localId){
  if(!localId) return null;
  // Se ja e um UUID valido, retorna direto
  if(localId && localId.length===36) return localId;
  // Se temos no cache, retorna
  if(_teacherIdMap[localId]) return _teacherIdMap[localId];
  // Buscar pelo nome no banco
  var teacher=TEACHERS.find(function(t){return t.id===localId;});
  if(!teacher) return null;
  var r=await sb.from('teachers').select('id').eq('nome',teacher.nome).single();
  if(r.data){ _teacherIdMap[localId]=r.data.id; return r.data.id; }
  return null;
}
async function salvarTeacherDB(t){
  if(!sb) return;
  try{
    // Verificar se teacher já existe pelo nome
    var check=await sb.from('teachers').select('id').eq('nome',t.nome).single();
    if(check.data){
      // Já existe, guardar o UUID do banco
      _teacherIdMap[t.id]=check.data.id;
      return check.data.id;
    }
    // Inserir sem ID (banco gera uuid)
    var r=await sb.from('teachers').insert({nome:t.nome,email:t.email||''}).select('id').single();
    if(r.data){ _teacherIdMap[t.id]=r.data.id; console.log('Teacher salva:',t.nome,r.data.id); }
    if(r.error) console.warn('Erro salvar teacher:', r.error.message);
  }catch(e){ console.warn('Erro salvarTeacherDB:',e); }
}

function alternarPerfil(){
  var anterior=S.perfil;
  var novo=S.perfilExtra||S.perfilAnterior;
  if(!novo) return;
  var novoRole=novo==='teacher'?'Teacher':(novo==='pedagogico'?'Coord. Pedagógica':novo);
  var eq=EQUIPE.find(function(e){return e.nome===S.userName&&(e.role===anterior||e.role===novo);});
  var novoTid=novo==='teacher'?(eq?eq.teacherId:S.teacherId):null;
  Object.assign(S,{
    perfil:novo,userRole:novoRole,teacherId:novoTid,
    perfilAnterior:anterior,perfilExtra:anterior,
    page:'dashboard'
  });
  document.getElementById('sb-role').textContent=novoRole;

    novo==='teacher'?'🏢 Área da Diretoria':

}

// ── REGRAS DE CUSTO DE AULA ─────────────────────────────
// Presente: teacher recebe (R$25 individual / R$35 dupla/turma/montada)
// Cancelada: teacher recebe (R$25 ou R$35)
// Remarcada: teacher NÃO recebe
// Faltou: teacher NÃO recebe
var CUSTO_INDIVIDUAL = 25;
var CUSTO_GRUPO = 35;

function calcCustoAula(aula){
  // Remarcada e Faltou = não paga
  if(aula.presenca==='Remarcada'||aula.presenca==='Faltou') return 0;
  // Presente, Cancelada ou Montada = paga
  var al=ALUNOS.find(function(a){return a.id===aula.alunoId;});
  var tipo=(al?al.tipo:null)||'individual';
  if(aula.presenca==='Montada') return CUSTO_GRUPO; // montada sempre R$35
  return (tipo==='individual')?CUSTO_INDIVIDUAL:CUSTO_GRUPO;
}

function calcCustoMesTeacher(teacherId, mes, ano){
  return AULAS.filter(function(a){
    if(a.teacherId!==teacherId) return false;
    if(!a.data) return false;
    var d=new Date(a.data);
    return d.getMonth()===mes && d.getFullYear()===ano;
  }).reduce(function(s,a){return s+calcCustoAula(a);},0);
}

    };}));
  }catch(e){ console.warn('Erro salvar despesas:',e); }
}

async function carregarDespesasDB(){
  if(!sb) return;
  try{
    var r=await sb.from('despesas').select('*');

      DESPESAS=r.data.map(function(d){return {
        id:d.id,mes:d.mes,ano:d.ano,categoria:d.categoria,descricao:d.descricao,valor:parseFloat(d.valor)||0
      };});

  }catch(e){ console.warn('Despesas: tabela pode não existir ainda',e); }
}

function renderFluxoCaixa(rc){

  var mes=hoje.getMonth();
  var ano=hoje.getFullYear();

  var desp=DESPESAS.filter(function(d){return d.mes===mes&&d.ano===ano;});
  var totalDesp=desp.reduce(function(s,d){return s+d.valor;},0);
  var mrr=ALUNOS.filter(function(a){return a.status==='Ativo'&&isPagante(a);}).reduce(function(s,a){return s+parseFloat(a.valor||0);},0);
  var saldo=mrr-totalDesp;

  // Custo previsão teachers este mês
  var custoTeachersPrev=0;
  var teacherIds=[...new Set(AULAS.filter(function(a){
    if(!a.data) return false;
    var d=new Date(a.data);
    return d.getMonth()===mes&&d.getFullYear()===ano;
  }).map(function(a){return a.teacherId;}))];
  teacherIds.forEach(function(tid){
    custoTeachersPrev+=calcCustoMesTeacher(tid,mes,ano);
  });

  rc.innerHTML=
    // Seletor de mês
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'
    +'<label style="font-size:12px;font-weight:700;color:var(--crose)">Mês:</label>'
    +'<select id="fluxo-mes" style="padding:7px 12px;border-radius:8px;border:1.5px solid rgba(121,20,40,.18);background:#fff;color:var(--cd);font-size:12px">'
    +meses.map(function(m,i){return '<option value="'+i+'"'+(i===mes?' selected':'')+'>'+m+'</option>';}).join('')
    +'</select>'
    +'<select id="fluxo-ano" style="padding:7px 12px;border-radius:8px;border:1.5px solid rgba(121,20,40,.18);background:#fff;color:var(--cd);font-size:12px">'
    +[ano-1,ano,ano+1].map(function(y){return '<option value="'+y+'"'+(y===ano?' selected':'')+'>'+y+'</option>';}).join('')
    +'</select>'
    +'<button class="btn btn-ghost btn-sm" onclick="filtrarFluxo()">Filtrar</button>'
    +'</div>'
    // KPIs
    +'<div class="sg g4" style="margin-bottom:20px">'
    +'<div class="sc ok"><div class="sl">Receita prevista</div><div class="sv">R$ '+mrr.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div><div style="font-size:11px;color:#666;margin-top:2px">MRR</div></div>'
    +'<div class="sc warn"><div class="sl">Despesas lançadas</div><div class="sv">R$ '+totalDesp.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div></div>'
    +'<div class="sc warn"><div class="sl">Custo teachers</div><div class="sv">R$ '+custoTeachersPrev.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div><div style="font-size:11px;color:#666;margin-top:2px">Baseado nas aulas</div></div>'
    +'<div class="sc '+(saldo>=0?'ok':'')+'"><div class="sl">Saldo previsto</div><div class="sv" style="color:'+(saldo>=0?'#16a34a':'#dc2626')+'">R$ '+saldo.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div></div>'
    +'</div>'
    // Form nova despesa
    +'<div class="card" style="margin-bottom:16px"><div class="ch"><i class="ti ti-plus"></i><h3>Lançar despesa</h3></div>'
    +'<div style="padding:0 16px 16px"><div class="fgrid">'
    +'<div class="fg"><label>Categoria</label><select id="desp-cat">'
    +categorias.map(function(c){return '<option>'+c+'</option>';}).join('')+'</select></div>'
    +'<div class="fg"><label>Descrição</label><input id="desp-desc" placeholder="Ex: Conta Zoom, Anúncios Instagram..."></div>'
    +'<div class="fg"><label>Valor (R$)</label><input type="number" id="desp-valor" placeholder="0,00" step="0.01"></div>'
    +'</div>'
    +'<button class="btn btn-primary" style="margin-top:8px" onclick="lancarDespesa()"><i class="ti ti-plus"></i> Lançar</button>'
    +'</div></div>'
    // Lista despesas
    +'<div class="card"><div class="ch"><i class="ti ti-list"></i><h3>Despesas — '+meses[mes]+' '+ano+'</h3></div>'
    +(desp.length
      ?'<table class="tbl"><tr><th>Categoria</th><th>Descrição</th><th>Valor</th><th></th></tr>'
       +desp.map(function(d){
         return '<tr><td>'+bdg(d.categoria)+'</td><td>'+d.descricao+'</td><td>R$ '+d.valor.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</td>'

       }).join('')+'</table>'
      :'<div style="text-align:center;padding:30px;color:var(--crose)">Nenhuma despesa lançada.</div>')

  setTimeout(function(){
    document.getElementById('filtro-fluxo-btn') && document.getElementById('filtro-fluxo-btn').addEventListener('click',filtrarFluxo);

function lancarDespesa(){
  var cat=document.getElementById('desp-cat');

  var hoje=new Date();
  var d={id:uuid(),mes:hoje.getMonth(),ano:hoje.getFullYear(),
    categoria:(cat?cat.value:'Outros'),descricao:desc.value,valor:parseFloat(val.value)||0};
  DESPESAS.push(d);
  salvarDespesasDB();
  showToast('Despesa lançada! ✅');
  renderFluxoCaixa(document.getElementById('rel-content'));
}

function removerDespesa(id){
  if(!confirm('Remover esta despesa?')) return;
  DESPESAS=DESPESAS.filter(function(d){return d.id!==id;});
  if(sb){ try{ sb.from('despesas').delete().eq('id',id); }catch(e){} }
  renderFluxoCaixa(document.getElementById('rel-content'));
}

function filtrarFluxo(){
  var m=parseInt((document.getElementById('fluxo-mes')||{value:new Date().getMonth()}).value);

  var rc=document.getElementById('rel-content');
  var desp=DESPESAS.filter(function(d){return d.mes===m&&d.ano===y;});
  var totalDesp=desp.reduce(function(s,d){return s+d.valor;},0);
  var mrr=ALUNOS.filter(function(a){return a.status==='Ativo'&&isPagante(a);}).reduce(function(s,a){return s+parseFloat(a.valor||0);},0);
  // Re-render
  renderFluxoCaixa(rc);
}

  var rows=TEACHERS.map(function(t){

    var aulasDoMes=AULAS.filter(function(a){
      if(a.teacherId!==tid&&a.teacherId!==t.id) return false;
      if(!a.data) return false;
      var d=new Date(a.data); return d.getMonth()===mes&&d.getFullYear()===ano;
    });
    var presentes=aulasDoMes.filter(function(a){return a.presenca==='Presente';}).length;
    var canceladas=aulasDoMes.filter(function(a){return a.presenca==='Cancelada';}).length;
    var remarcadas=aulasDoMes.filter(function(a){return a.presenca==='Remarcada';}).length;
    var montadas=aulasDoMes.filter(function(a){return a.presenca==='Montada';}).length;
    var faltou=aulasDoMes.filter(function(a){return a.presenca==='Faltou';}).length;
    var custo=calcCustoMesTeacher(tid,mes,ano)+calcCustoMesTeacher(t.id,mes,ano);
    return {nome:t.nome,presentes:presentes,canceladas:canceladas,remarcadas:remarcadas,montadas:montadas,faltou:faltou,custo:custo,total:aulasDoMes.length};
  }).filter(function(r){return r.total>0||true;});

  var totalCusto=rows.reduce(function(s,r){return s+r.custo;},0);

  rc.innerHTML=
    '<div class="sg g3" style="margin-bottom:20px">'
    +'<div class="sc warn"><div class="sl">Custo total teachers</div><div class="sv">R$ '+totalCusto.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div><div style="font-size:11px;color:#666;margin-top:2px">'+meses[mes]+' '+ano+'</div></div>'
    +'<div class="sc"><div class="sl">Individual</div><div class="sv">R$ '+CUSTO_INDIVIDUAL+',00/h</div></div>'
    +'<div class="sc"><div class="sl">Turma/Dupla/Montada</div><div class="sv">R$ '+CUSTO_GRUPO+',00/h</div></div>'
    +'</div>'
    +'<div class="card"><div class="ch"><i class="ti ti-school"></i><h3>Previsão por teacher — '+meses[mes]+' '+ano+'</h3></div>'
    +'<table class="tbl"><tr><th>Teacher</th><th>Presentes</th><th>Canceladas</th><th>Montadas</th><th>Remarcadas</th><th>Faltou (aluno)</th><th style="color:var(--cr)">Previsão R$</th></tr>'
    +rows.map(function(r){
      return '<tr>'
        +'<td class="nm">'+r.nome+'</td>'
        +'<td style="color:#16a34a">'+r.presentes+'</td>'
        +'<td style="color:#ca8a04">'+r.canceladas+'</td>'
        +'<td style="color:#8b5cf6">'+r.montadas+'</td>'
        +'<td style="color:#94a3b8">'+r.remarcadas+'</td>'
        +'<td style="color:#dc2626">'+r.faltou+'</td>'
        +'<td style="font-weight:700;color:var(--cr)">R$ '+r.custo.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</td>'
        +'</tr>';
    }).join('')
    +'<tr style="background:rgba(121,20,40,.05);font-weight:700"><td colspan="6">Total</td><td style="color:var(--cr)">R$ '+totalCusto.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</td></tr>'
    +'</table></div>'
    +'<div class="card" style="margin-top:16px"><div class="ch"><i class="ti ti-info-circle"></i><h3>Regras de pagamento</h3></div>'
    +'<div style="padding:8px 16px 16px;font-size:12px;color:var(--cd);line-height:1.8">'
    +'✅ <strong>Presente</strong> — teacher recebe (R$25 individual / R$35 dupla, turma ou montada)<br>'
    +'✅ <strong>Cancelada</strong> — teacher recebe (aula preparada)<br>'
    +'🔧 <strong>Montada</strong> — teacher recebe R$35 (montagem de material)<br>'
    +'❌ <strong>Remarcada</strong> — teacher NÃO recebe (aula será feita em outro momento)<br>'
    +'❌ <strong>Faltou (aluno)</strong> — teacher NÃO recebe'
    +'</div></div>';
}

// ── FINANCEIRO ──────────────────────────────────────────
function renderRelFinanceiro(rc){
  destroyCharts();
  var hoje = new Date();
  var mes = hoje.getMonth();
  var ano = hoje.getFullYear();

  // KPIs financeiros
  var totalAtivos = ALUNOS.filter(function(a){return a.status==='Ativo'&&isPagante(a);});
  var mrr = totalAtivos.reduce(function(s,a){return s+parseFloat(a.valor||0);},0);
  var pagos = ALUNOS.filter(function(a){return a.fin==='Pago'&&isPagante(a);});
  var recebido = pagos.reduce(function(s,a){return s+parseFloat(a.valor||0);},0);
  var inadimplentes = ALUNOS.filter(function(a){return a.fin==='Atrasado'&&isPagante(a);});
  var emAberto = inadimplentes.reduce(function(s,a){return s+parseFloat(a.valor||0);},0);
  var ticketMedio = totalAtivos.length?Math.round(mrr/totalAtivos.length):0;
  var taxaInad = totalAtivos.length?Math.round(inadimplentes.length/totalAtivos.length*100):0;

  // Receita por vencimento (simula fluxo mensal)
  var porVenc = {};
  [5,10,15,20,30].forEach(function(v){ porVenc[v]=0; });
  totalAtivos.forEach(function(a){
    var v=parseInt(a.venc)||10;
    if(!porVenc[v]) porVenc[v]=0;
    porVenc[v]+=parseFloat(a.valor||0);
  });

  // Receita por teacher
  var porTeacher = {};
  totalAtivos.forEach(function(a){
    var t=getTeacher(a.teacherId);
    var tn=t.nome||'—';
    if(!porTeacher[tn]) porTeacher[tn]=0;
    porTeacher[tn]+=parseFloat(a.valor||0);
  });

  // Receita por tipo
  var porTipo = {individual:0,dupla:0,turma:0};
  totalAtivos.forEach(function(a){
    var tipo=a.tipo||'individual';
    if(!porTipo[tipo]) porTipo[tipo]=0;
    porTipo[tipo]+=parseFloat(a.valor||0);
  });

  rc.innerHTML = 
    // KPIs
    '<div class="sg g4" style="margin-bottom:20px">'
    +'<div class="sc ok"><div class="sl">MRR</div><div class="sv">R$ '+mrr.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div><div style="font-size:11px;color:#666;margin-top:2px">Receita recorrente mensal</div></div>'
    +'<div class="sc ok"><div class="sl">Recebido</div><div class="sv">R$ '+recebido.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div><div style="font-size:11px;color:#666;margin-top:2px">'+pagos.length+' alunos pagos</div></div>'
    +'<div class="sc warn"><div class="sl">Em aberto</div><div class="sv">R$ '+emAberto.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div><div style="font-size:11px;color:#666;margin-top:2px">'+inadimplentes.length+' inadimplentes ('+taxaInad+'%)</div></div>'
    +'<div class="sc"><div class="sl">Ticket médio</div><div class="sv">R$ '+ticketMedio.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div><div style="font-size:11px;color:#666;margin-top:2px">por aluno ativo</div></div>'
    +'</div>'
    // Gráficos
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">'
    +'<div class="card"><div class="ch"><i class="ti ti-chart-bar"></i><h3>Receita por vencimento</h3></div><div style="padding:0 16px 16px"><canvas id="chart-venc" height="220"></canvas></div></div>'
    +'<div class="card"><div class="ch"><i class="ti ti-chart-pie"></i><h3>Receita por tipo de aula</h3></div><div style="padding:0 16px 16px"><canvas id="chart-tipo" height="220"></canvas></div>'
    +'</div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">'
    +'<div class="card"><div class="ch"><i class="ti ti-chart-bar"></i><h3>Receita por teacher</h3></div><div style="padding:0 16px 16px"><canvas id="chart-teacher" height="220"></canvas></div></div>'
    +'<div class="card"><div class="ch"><i class="ti ti-users"></i><h3>Status financeiro</h3></div><div style="padding:0 16px 16px"><canvas id="chart-status" height="220"></canvas></div></div>'
    +'</div>'
    // Tabela detalhada por vencimento
    +'<div class="card"><div class="ch"><i class="ti ti-table"></i><h3>Detalhamento por vencimento</h3></div>'
    +'<table class="tbl"><tr><th>Vencimento</th><th>Alunos</th><th>Valor total</th><th>Pagos</th><th>Pendentes</th><th>Atrasados</th></tr>'
    +[5,10,15,20,30].map(function(v){
      var gr=ALUNOS.filter(function(a){return parseInt(a.venc)===v&&a.status==='Ativo';});
      var tot=gr.reduce(function(s,a){return s+parseFloat(a.valor||0);},0);
      var pg=gr.filter(function(a){return a.fin==='Pago';}).length;
      var pe=gr.filter(function(a){return a.fin==='Pendente';}).length;
      var at=gr.filter(function(a){return a.fin==='Atrasado';}).length;
      return gr.length?'<tr><td>Dia '+v+'</td><td>'+gr.length+'</td><td>R$ '+tot.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</td><td style="color:#16a34a">'+pg+'</td><td>'+pe+'</td><td style="color:#dc2626">'+at+'</td></tr>':'';
    }).join('')+'</table></div>';

  // Render charts
  setTimeout(function(){
    // Receita por vencimento
    var ctx1=document.getElementById('chart-venc');
    if(ctx1){
      _charts.venc=new Chart(ctx1,{type:'bar',data:{
        labels:Object.keys(porVenc).map(function(v){return 'Dia '+v;}),
        datasets:[{label:'R$',data:Object.values(porVenc),backgroundColor:'rgba(121,20,40,.7)',borderRadius:6}]
      },options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return 'R$'+v.toLocaleString('pt-BR');}}}}}});
    }
    // Tipo de aula
    var ctx2=document.getElementById('chart-tipo');
    if(ctx2){
      _charts.tipo=new Chart(ctx2,{type:'doughnut',data:{
        labels:['Individual','Dupla','Turma'],
        datasets:[{data:[porTipo.individual,porTipo.dupla,porTipo.turma],backgroundColor:['#791428','#BC5572','#F7C6D3']}]
      },options:{responsive:true,plugins:{legend:{position:'bottom'}}}});
    }
    // Por teacher
    var ctx3=document.getElementById('chart-teacher');
    if(ctx3){
      var tNames=Object.keys(porTeacher).sort(function(a,b){return porTeacher[b]-porTeacher[a];});
      _charts.teacher=new Chart(ctx3,{type:'bar',data:{
        labels:tNames,
        datasets:[{label:'R$',data:tNames.map(function(t){return porTeacher[t];}),backgroundColor:'rgba(188,85,114,.7)',borderRadius:6}]
      },options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return 'R$'+v.toLocaleString('pt-BR');}}}}}});
    }
    // Status
    var ctx4=document.getElementById('chart-status');
    if(ctx4){
      var pg2=ALUNOS.filter(function(a){return a.fin==='Pago';}).length;
      var pe2=ALUNOS.filter(function(a){return a.fin==='Pendente';}).length;
      var at2=ALUNOS.filter(function(a){return a.fin==='Atrasado'&&isPagante(a);}).length;
      _charts.status=new Chart(ctx4,{type:'pie',data:{

        datasets:[{data:[pg2,pe2,at2],backgroundColor:['#16a34a','#ca8a04','#dc2626']}]

// ── EXPORTAÇÕES ──────────────────────────────────────────
function exportarExcel(){
  var wb = XLSX.utils.book_new();

  // Aba Financeiro
  var finData=[['Nome','Nível','Teacher','Tipo','Plano','Valor (R$)','Vencimento','Status Fin.','Status','Dias Atraso']];
  ALUNOS.forEach(function(a){
    finData.push([a.nome,a.nivel,getTeacher(a.teacherId).nome||'—',a.tipo||'individual',a.plano,a.valor,a.venc,a.fin,a.status,a.diasInadimplente||0]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(finData), 'Financeiro');

  // Aba Comercial/Leads
  var comData=[['Nome','Email','Telefone','Origem','Etapa','Nível','Objetivo']];
  LEADS.forEach(function(l){
    comData.push([l.nome,l.email||'',l.tel||'',l.origem||'',l.etapa,l.nivel||'',l.objetivo||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(comData), 'Leads');

  // Aba Despesas
  var despData=[['Mês','Ano','Categoria','Descrição','Valor (R$)']];
  DESPESAS.forEach(function(d){
    var meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    despData.push([meses[d.mes]||d.mes,d.ano,d.categoria,d.descricao,d.valor]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(despData), 'Despesas');

  // Aba Custo Teachers
  var hoje2=new Date();
  var custoData=[['Teacher','Presentes','Canceladas','Montadas','Remarcadas','Faltou','Custo R$']];
  TEACHERS.forEach(function(t){
    var tid=_teacherIdMap[t.id]||t.id;
    var aulasM=AULAS.filter(function(a){
      if(a.teacherId!==tid&&a.teacherId!==t.id) return false;
      if(!a.data) return false;
      var d=new Date(a.data); return d.getMonth()===hoje2.getMonth()&&d.getFullYear()===hoje2.getFullYear();
    });
    var pres=aulasM.filter(function(a){return a.presenca==='Presente';}).length;
    var canc=aulasM.filter(function(a){return a.presenca==='Cancelada';}).length;
    var mont=aulasM.filter(function(a){return a.presenca==='Montada';}).length;
    var remar=aulasM.filter(function(a){return a.presenca==='Remarcada';}).length;
    var falt=aulasM.filter(function(a){return a.presenca==='Faltou';}).length;
    var custo=calcCustoMesTeacher(tid,hoje2.getMonth(),hoje2.getFullYear())+calcCustoMesTeacher(t.id,hoje2.getMonth(),hoje2.getFullYear());
    custoData.push([t.nome,pres,canc,mont,remar,falt,custo]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(custoData), 'Custo Teachers');

  // Aba Resumo

function inits(nome){return (nome||'').split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase()||'?';}
function byName(arr){return arr.slice().sort(function(a,b){return a.nome.localeCompare(b.nome,'pt');});}
function isPagante(a){return a.plano!=='Publicidade';}
function getTeacher(id){
  if(!id) return {nome:'—'};
  // Buscar por ID local (t0, t1...)
  var byLocal=TEACHERS.find(function(t){return t.id===id;});
  if(byLocal) return byLocal;
  // Buscar pelo UUID do banco via _teacherIdMap
  var localId=Object.keys(_teacherIdMap).find(function(k){return _teacherIdMap[k]===id && k!==id;});
  if(localId) return TEACHERS.find(function(t){return t.id===localId;})||{nome:'—'};
  return {nome:'—'};
}
function myAlunos(){
  if(S.perfil==='teacher'&&S.teacherId){
    // Checar ID local (t0, t1...) E UUID do banco
    var tUUID=_teacherIdMap[S.teacherId]||S.teacherId;
    return byName(ALUNOS.filter(function(a){
      return a.teacherId===S.teacherId||a.teacherId===tUUID;
    }));
  }
  return byName(ALUNOS);
}
function fmtDate(d){return d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});}
function fmtDateBr(iso){if(!iso)return '';try{return new Date(iso+'T12:00').toLocaleDateString('pt-BR');}catch(e){return iso;}}
function getWeekDates(){
  var hoje=new Date(),dow=hoje.getDay();
  var mon=new Date(hoje);mon.setDate(hoje.getDate()-(dow===0?6:dow-1));
  return [0,1,2,3,4].map(function(i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function bdg(val){
  var map={
    'Pago':'ok','Ativo':'ok','Presente':'ok','Ótimo':'ok','concluido':'ok','Em dia':'ok','Montada':'warn','Cancelada':'warn','Remarcada':'warn',
    'Pendente':'warn','Flexível':'warn','andamento':'warn','Reposição':'warn',
    'Atrasado':'err','Inativo':'err','Faltou':'err','perdido':'err','bloqueado':'err',
    'A1':'info','A2':'info','B1':'info','B2':'info','C1':'info','C2':'info',
  };
  var cls=map[val]||'gray';
  return '<span class="badge badge-'+cls+'">'+val+'</span>';

function uploadFichaEdit(ev){
  var f=ev.target.files&&ev.target.files[0];
  if(!f)return;
  if(f.type!=='application/pdf'){showToast('Apenas PDFs!');return;}
  if(f.size>4*1024*1024){showToast('⚠️ PDF muito grande (máx. 4 MB). Comprima o arquivo e tente de novo.');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var a=ALUNOS.find(function(x){return x.id===window._editingAlunaId;});
    if(!a)return;
    a.fichaUrl=e.target.result;
    salvarAlunaDB(a);
    showToast('Ficha anexada! 📎');
    openEditAluna(window._editingAlunaId);
    setTimeout(function(){switchEditTab('ficha');},60);
  };
  reader.readAsDataURL(f);
}
function removerFichaEdit(){
  var a=ALUNOS.find(function(x){return x.id===window._editingAlunaId;});
  if(!a)return;
  a.fichaUrl=null;salvarAlunaDB(a);showToast('Ficha removida.');

  setTimeout(function(){switchEditTab('ficha');},60);
}

async function excluirAluna(id){
  if(!confirm('Excluir esta aluna permanentemente? Esta ação não pode ser desfeita.')) return;

function salvarEquipe(){
  var nome=document.getElementById('ce-nome').value.trim();

  var senha=document.getElementById('ce-senha').value;

  var labels={teacher:'Teacher',comercial:'Comercial',financeiro:'Financeiro'};
  var av=inits(nome);
  var newId='e'+Date.now();
  var tid=role==='teacher'?'t'+Date.now():null;
  if(role==='teacher') TEACHERS.push({id:tid,nome:nome,email:usuario+'@amenina.com'});
  EQUIPE.push({id:newId,nome:nome,role:role,roleLabel:labels[role],usuario:usuario,senha:senha,avatar:av,teacherId:tid,duploPerfil:false});
  closeModal();showToast('Membro adicionado! ✅');

}

  var valor=calcularValor(tipo,aulas);
  var vEl=document.getElementById('ca-valor');
  var vfEl=document.getElementById('ca-valor-final');
  if(vEl) vEl.value=valor;
  if(vfEl) vfEl.value=valor;
  var dEl=document.getElementById('ca-desconto');
  if(dEl) dEl.value='';
}
function atualizarValorComDesconto(){
  var vEl=document.getElementById('ca-valor');
  var dEl=document.getElementById('ca-desconto');
  var vfEl=document.getElementById('ca-valor-final');
  if(!vEl||!dEl||!vfEl) return;
  var valorCheio=parseFloat(vEl.value)||0;
  var desconto=parseFloat(dEl.value)||0;
  desconto=Math.min(Math.max(desconto,0),100);
  var valorFinal=Math.round(valorCheio*(1-desconto/100));
  vfEl.value=valorFinal;
}
function atualizarHorariosDisp(){

function renderGradeDisp(teacherId,div,aulasSemana){
  var horas=[];for(var h=7;h<=23;h++) horas.push(String(h).padStart(2,'0')+':00');
  var diasNomes=['Seg','Ter','Qua','Qui','Sex'];
  var hoje=new Date(),dow=hoje.getDay();
  var mon=new Date(hoje);mon.setDate(hoje.getDate()-(dow===0?6:dow-1));
  var dias=[];
  for(var i=0;i<5;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);dias.push(d.toISOString().split('T')[0]);}
  var ocupados={};
  Object.keys(HORARIOS).forEach(function(k){
    var sl=HORARIOS[k];
    if(sl.teacherId===teacherId){
      var p=k.split('_');
      if(sl.tipo==='bloqueado'||sl.alunoId) ocupados[p[1]+'_'+p[2]]=true;
    }
  });
  var info='<div style="font-size:10px;color:var(--cr);font-weight:600;margin-bottom:6px">Clique para selecionar '+aulasSemana+' horário'+(aulasSemana>1?'s':'')+' ('+_horariosSelec.length+'/'+aulasSemana+')</div>';
  var tbl='<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:9px;width:100%">';
  tbl+='<tr><th style="padding:2px 3px;background:var(--cd);color:var(--ccream);border:1px solid rgba(247,198,211,.1);width:32px">H</th>';
  diasNomes.forEach(function(n,i){tbl+='<th style="padding:2px 3px;background:var(--cd);color:var(--ccream);border:1px solid rgba(247,198,211,.1)">'+n+'<br><span style="opacity:.6;font-size:8px">'+dias[i].slice(5).replace('-','/')+'</span></th>';});
  tbl+='</tr>';
  horas.forEach(function(hora){
    tbl+='<tr><td style="padding:2px 3px;background:var(--cd);color:var(--cp);font-size:8px;text-align:center;font-weight:700;border:1px solid rgba(247,198,211,.1)">'+hora+'</td>';
    dias.forEach(function(dia){
      var key=dia+'_'+hora;
      var ocp=!!ocupados[key];
      var selKey=teacherId+'_'+dia+'_'+hora;
      var sel=_horariosSelec.indexOf(selKey)!==-1;
      if(ocp){
        tbl+='<td style="padding:1px;border:1px solid rgba(121,20,40,.07);text-align:center;background:rgba(121,20,40,.06)"><span style="font-size:8px;color:#aaa">✗</span></td>';
      } else {
        tbl+='<td style="padding:1px;border:1px solid rgba(121,20,40,.07);text-align:center;cursor:pointer;background:'+(sel?'rgba(45,106,16,.3)':'rgba(45,106,16,.05)')+'" data-hk="'+selKey+'" data-dia="'+dia+'" data-hora="'+hora+'"><span style="font-size:8px;color:#2d6a10;pointer-events:none">'+(sel?'✓':hora)+'</span></td>';
      }
    });
    tbl+='</tr>';
  });
  tbl+='</table></div>';
  div.innerHTML=info+tbl;
  div.querySelectorAll('[data-hk]').forEach(function(el){
    el.addEventListener('click',function(){
      var hk=this.dataset.hk;
      var idx=_horariosSelec.indexOf(hk);
      if(idx!==-1){ _horariosSelec.splice(idx,1); }
      else{
        var max=parseInt((document.getElementById('ca-aulas-semana')||{value:'1'}).value)||1;
        if(_horariosSelec.length>=max){showToast('Máximo '+max+' horário'+(max>1?'s':'')+'!');return;}
        _horariosSelec.push(hk);
      }
      renderGradeDisp(teacherId,div,parseInt((document.getElementById('ca-aulas-semana')||{value:'1'}).value)||1);
    });
  });
}

function salvarAluna(){
  var nome=(document.getElementById('ca-nome').value||'').trim();
  var email=(document.getElementById('ca-email').value||'').trim();
  var senha=document.getElementById('ca-senha').value;
  if(!nome){showToast('Preencha o nome.');return;}
  if(!email){showToast('Preencha o email.');return;}
  if(!senha){showToast('Crie uma senha para a aluna.');return;}
  if(ALUNOS.find(function(a){return a.email.toLowerCase()===email.toLowerCase();})){showToast('Email já cadastrado.');return;}
  var tid=document.getElementById('ca-teacher').value;
  var tipo=(document.getElementById('ca-tipo')||{value:'individual'}).value;
  var valorCheio=parseFloat(document.getElementById('ca-valor').value)||0;
  var desconto=parseFloat((document.getElementById('ca-desconto')||{value:'0'}).value)||0;
  var valor=parseFloat((document.getElementById('ca-valor-final')||{value:String(valorCheio)}).value)||valorCheio;
  var ddiEl=document.getElementById('ca-ddi');
  var newId=uuid();
  var aulasSemana=parseInt((document.getElementById('ca-aulas-semana')||{value:'1'}).value)||1;
  var newAl={id:newId,nome:nome,email:email,ddi:ddiEl?ddiEl.value:'+55',
    tel:(document.getElementById('ca-tel').value||''),senha:senha,
    nivel:document.getElementById('ca-nivel').value,teacherId:tid,
    tipo:tipo,aulasSemana:aulasSemana,plano:document.getElementById('ca-plano').value,valor:valor,valorCheio:valorCheio,desconto:desconto,
    venc:parseInt(document.getElementById('ca-venc').value),
    fin:document.getElementById('ca-fin').value,status:'Ativo',
    faltas:0,freq:100,risco:'low',matricula:new Date().toLocaleDateString('pt-BR'),
    nfEmitida:false,fichaUrl:null,planoHtml:null,planoProgresso:[],comentarios:[]};
  ALUNOS.push(newAl);
  // Registrar horários selecionados
  if(_horariosSelec.length>0){
    _horariosSelec.forEach(function(hk){
      var p1=hk.indexOf('_');var p2=hk.indexOf('_',p1+1);
      var tId=hk.slice(0,p1);var dia=hk.slice(p1+1,p2);var hora=hk.slice(p2+1);
      HORARIOS[tId+'_'+dia+'_'+hora]={tipo:'fixo',alunoId:newId,teacherId:tId,obs:''};
    });
    _horariosSelec=[];
  }
  // Salvar horários no Supabase
  Object.keys(HORARIOS).forEach(function(k){
    var sl=HORARIOS[k];
    if(sl.alunoId===newId) salvarHorarioDB(k,sl);
  });
  // Se dupla, criar 2º aluno com valor dividido
  if(tipo==='dupla'){
    var nome2=(document.getElementById('ca-nome2')||{value:''}).value.trim();
    var email2=(document.getElementById('ca-email2')||{value:''}).value.trim();
    var tel2=(document.getElementById('ca-tel2')||{value:''}).value.trim();
    if(nome2){
      var valorDupla=Math.round(valor/2);
      newAl.valor=valorDupla;
      newAl.valorCheio=Math.round(valorCheio/2);
      var newId2=uuid();
      var newAl2={id:newId2,nome:nome2,email:email2,ddi:newAl.ddi,tel:tel2,senha:'Aluno2026',
        nivel:newAl.nivel,teacherId:newAl.teacherId,aulasSemana:newAl.aulasSemana,
        tipo:'dupla',plano:newAl.plano,valor:valorDupla,valorCheio:Math.round(valorCheio/2),
        desconto:newAl.desconto,venc:newAl.venc,fin:newAl.fin,status:newAl.status,
        faltas:0,freq:100,risco:'low',matricula:newAl.matricula,
        nfEmitida:false,comentarios:[]};
      ALUNOS.push(newAl2);
      salvarAlunaDB(newAl2);
    }
  }
  closeModal();showToast('Aluna '+nome+' cadastrada! ✅');
  salvarAlunaDB(newAl);
  renderUsuarios(document.getElementById('pc'),document.getElementById('tb-actions'));
}

function salvarEditAluna(){
  var al=ALUNOS.find(function(a){return a.id===window._editingAlunaId;});
  if(!al) return;
  var g=function(id){return document.getElementById(id);};
  if(g('ea-nome')&&g('ea-nome').value.trim()) al.nome=g('ea-nome').value.trim();
  if(g('ea-email')&&g('ea-email').value.trim()) al.email=g('ea-email').value.trim();
  if(g('ea-tel')) al.tel=g('ea-tel').value;
  if(g('ea-senha')&&g('ea-senha').value) al.senha=g('ea-senha').value;
  if(g('ea-nivel')) al.nivel=g('ea-nivel').value;
  if(g('ea-teacher')) al.teacherId=g('ea-teacher').value;
  if(g('ea-aulas')) al.aulasSemana=parseInt(g('ea-aulas').value)||al.aulasSemana;
  if(g('ea-status')) al.status=g('ea-status').value;
  if(g('ea-plano')) al.plano=g('ea-plano').value;
  if(g('ea-pais')) al.pais=g('ea-pais').value;
  if(g('ea-endereco')) al.endereco=g('ea-endereco').value;
  if(g('ea-cidade')) al.cidade=g('ea-cidade').value;
  if(g('ea-estado')) al.estado=g('ea-estado').value;
  if(g('ea-cep')) al.cep=g('ea-cep').value;
  if(g('ea-valor')) al.valor=parseInt(g('ea-valor').value)||al.valor;
  if(g('ea-venc')) al.venc=parseInt(g('ea-venc').value)||al.venc;
  if(g('ea-fin')){
    var finAnt=al.fin;
    al.fin=g('ea-fin').value;
    if(al.fin==='Pago'&&finAnt!=='Pago')registrarPagamento(al);
    if(al.fin!=='Pago'&&finAnt==='Pago')estornarPagamentoHoje(al.id);
  }
  salvarAlunaDB(al);
  closeModal();showToast('Dados atualizados! ✅');
  renderUsuarios(document.getElementById('pc'),document.getElementById('tb-actions'));
}

<script>
// ══════════════════════════════════════════════════════
// GRADE DE HORÁRIOS
// ══════════════════════════════════════════════════════
var _horarioTeacherId=null;

function renderHorarios(c,a){
  if(S.perfil==='teacher'&&S.teacherId) _horarioTeacherId=S.teacherId;
  if(!_horarioTeacherId&&TEACHERS.length) _horarioTeacherId=TEACHERS[0].id;
  if(S.perfil!=='teacher')
    a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openAddSlot()"><i class="ti ti-plus"></i> Adicionar horário</button>';
  else
    a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openAddSlot()"><i class="ti ti-plus"></i> Adicionar horário</button>';

  var dias=getWeekDates(),horas=[];for(var h=7;h<=23;h++) horas.push(h);
  var tiposLabel={fixo:'Fixo',flexivel:'Flexível',reposicao:'Reposição',bloqueado:'Bloqueado'};

  var leg='<div class="slot-legend">'
    +'<div class="slot-legend-item"><div class="slot-legend-dot" style="background:#e8f4df;border:1px solid #2d6a10"></div>Fixo</div>'
    +'<div class="slot-legend-item"><div class="slot-legend-dot" style="background:#e8f0fc;border:1px solid #1a4fa0"></div>Flexível</div>'
    +'<div class="slot-legend-item"><div class="slot-legend-dot" style="background:#fef3e0;border:1px solid #7a4f00"></div>Reposição</div>'
    +'<div class="slot-legend-item"><div class="slot-legend-dot" style="background:#fceaf0;border:1px solid #791428"></div>Bloqueado</div>'
    +'</div>';

  // Abas de teacher (exceto quando é teacher)
  var tabsHtml='';
  if(S.perfil!=='teacher'){
    tabsHtml='<div id="hor-tabs" style="display:flex;border-bottom:2px solid rgba(121,20,40,.1);margin-bottom:14px;overflow-x:auto;flex-wrap:nowrap">'
      +TEACHERS.map(function(t){
        var ativo=t.id===_horarioTeacherId;
        return '<div data-tid="'+t.id+'" style="padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:2px solid '+(ativo?'var(--cr)':'transparent')+';color:'+(ativo?'var(--cr)':'var(--crose)')+';margin-bottom:-2px;transition:all .15s">'+t.nome+'</div>';
      }).join('')+'</div>';
  }

  var teacherAtual=TEACHERS.find(function(t){return t.id===_horarioTeacherId;});
  var header=teacherAtual?'<div style="font-size:14px;font-weight:700;color:var(--cd);margin-bottom:10px">📅 '+teacherAtual.nome+'</div>':'';

  var tbl='<div class="schedule-wrap"><table class="schedule-table"><thead><tr><th style="width:55px">Hora</th>'
    +dias.map(function(d){return '<th>'+fmtDate(d)+'</th>';}).join('')+'</tr></thead><tbody>';
  horas.forEach(function(h){
    var hora=String(h).padStart(2,'0')+':00';
    tbl+='<tr><td class="time-col">'+hora+'</td>';
    dias.forEach(function(d){
      var ds=d.toISOString().split('T')[0];
      var key=(_horarioTeacherId||'')+'_'+ds+'_'+hora;
      var sl=HORARIOS[key];
      if(sl){
        var al=ALUNOS.find(function(x){return x.id===sl.alunoId;});
        var nm=al?al.nome.split(' ')[0]:'—';
        tbl+='<td><div class="slot '+sl.tipo+'" data-slotkey="'+key+'"><div class="slot-nome">'+nm+'</div><div class="slot-tipo">'+tiposLabel[sl.tipo]+'</div></div></td>';
      } else {
        tbl+='<td><div class="slot" data-slotdate="'+ds+'" data-slothora="'+hora+'"></div></td>';
      }
    });
    tbl+='</tr>';
  });
  tbl+='</tbody></table></div>';

  c.innerHTML=leg+tabsHtml+header+'<div class="card" style="padding:8px">'+tbl+'</div>';

  setTimeout(function(){
    var tabsEl=document.getElementById('hor-tabs');
    if(tabsEl){tabsEl.querySelectorAll('[data-tid]').forEach(function(el){
      el.addEventListener('click',function(){
        _horarioTeacherId=this.dataset.tid;
        renderHorarios(document.getElementById('pc'),document.getElementById('tb-actions'));
      });
    });}
    c.querySelectorAll('[data-slotkey]').forEach(function(el){
      el.addEventListener('click',function(){openEditSlot(this.dataset.slotkey);});
    });
    c.querySelectorAll('[data-slotdate]').forEach(function(el){
      el.addEventListener('click',function(){openAddSlot(this.dataset.slotdate,this.dataset.slothora);});
    });
  },0);
}

function openAddSlot(data,hora){
  var teacherAtual=TEACHERS.find(function(t){return t.id===_horarioTeacherId;})||TEACHERS[0];
  var horaOpts='';for(var h=7;h<=23;h++){var hh=String(h).padStart(2,'0')+':00';horaOpts+='<option value="'+hh+'"'+(hh===hora?' selected':'')+'>'+hh+'</option>';}
  var alunosDaTeacher=_horarioTeacherId?byName(ALUNOS.filter(function(a){return a.teacherId===_horarioTeacherId;})):byName(ALUNOS);
  openModal('<div class="mhdr"><h2>Horário — '+(teacherAtual?teacherAtual.nome:'')+'</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fgrid"><div class="fg"><label>Data</label><input type="date" id="hs-data" value="'+(data||new Date().toISOString().split('T')[0])+'"></div>'
    +'<div class="fg"><label>Horário</label><select id="hs-hora">'+horaOpts+'</select></div></div>'
    +'<div class="fgrid"><div class="fg"><label>Tipo</label><select id="hs-tipo"><option value="fixo">Fixo</option><option value="flexivel">Flexível</option><option value="reposicao">Reposição</option><option value="bloqueado">Bloqueado</option></select></div>'
    +'<div class="fg"><label>Aluna</label><select id="hs-aluno"><option value="">— Nenhuma —</option>'+alunosDaTeacher.map(function(al){return '<option value="'+al.id+'">'+al.nome+'</option>';}).join('')+'</select></div></div>'
    +'<div class="fg"><label>Observações</label><input id="hs-obs" placeholder="Obs..."></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="salvarSlot()">Salvar</button></div>');
}

function openEditSlot(key){
  var sl=HORARIOS[key];if(!sl) return;
  window._editSlotKey=key;
  var p=key.split('_');
  var tipo=sl.tipo||'fixo';
  var alunosDaTeacher=byName(ALUNOS.filter(function(a){return a.teacherId===sl.teacherId||!sl.teacherId;}));
  openModal('<div class="mhdr"><h2>Editar horário</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div style="font-size:12px;color:var(--crose);margin-bottom:12px">'+fmtDateBr(p[1])+' às '+p[2]+'</div>'
    +'<div class="fgrid"><div class="fg"><label>Tipo</label><select id="hs-tipo"><option value="fixo"'+(tipo==='fixo'?' selected':'')+'>Fixo</option><option value="flexivel"'+(tipo==='flexivel'?' selected':'')+'>Flexível</option><option value="reposicao"'+(tipo==='reposicao'?' selected':'')+'>Reposição</option><option value="bloqueado"'+(tipo==='bloqueado'?' selected':'')+'>Bloqueado</option></select></div>'
    +'<div class="fg"><label>Aluna</label><select id="hs-aluno"><option value="">— Nenhuma —</option>'+alunosDaTeacher.map(function(al){return '<option value="'+al.id+'"'+(al.id===sl.alunoId?' selected':'')+'>'+al.nome+'</option>';}).join('')+'</select></div></div>'
    +'<div class="fg"><label>Observações</label><input id="hs-obs" value="'+(sl.obs||'')+'"></div>'
    +'<div class="mftr"><button class="btn btn-ghost" style="color:var(--crose)" onclick="excluirSlot()"><i class="ti ti-trash"></i> Excluir</button>'
    +'<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="atualizarSlot()">Salvar</button></div>');
}

function salvarSlot(){
  var data=document.getElementById('hs-data').value;
  var hora=document.getElementById('hs-hora').value;
  if(!data){showToast('Selecione a data.');return;}
  var key=(_horarioTeacherId||'')+'_'+data+'_'+hora;
  var newSlot={tipo:document.getElementById('hs-tipo').value,
    alunoId:document.getElementById('hs-aluno').value,
    teacherId:_horarioTeacherId||'',
    obs:document.getElementById('hs-obs').value};
  HORARIOS[key]=newSlot;
  salvarHorarioDB(key,newSlot);
  closeModal();showToast('Horário salvo! ✅');
  renderHorarios(document.getElementById('pc'),document.getElementById('tb-actions'));
}

function atualizarSlot(){
  var key=window._editSlotKey;
  if(!key||!HORARIOS[key]) return;
  HORARIOS[key].tipo=document.getElementById('hs-tipo').value;
  HORARIOS[key].alunoId=document.getElementById('hs-aluno').value;
  HORARIOS[key].obs=document.getElementById('hs-obs').value;
  salvarHorarioDB(key,HORARIOS[key]);
  closeModal();showToast('Horário atualizado! ✅');
  renderHorarios(document.getElementById('pc'),document.getElementById('tb-actions'));
}

function excluirSlot(){
  if(!confirm('Excluir este horário?')) return;
  excluirHoriarioDB(window._editSlotKey);
  delete HORARIOS[window._editSlotKey];
  closeModal();showToast('Horário excluído.');
  renderHorarios(document.getElementById('pc'),document.getElementById('tb-actions'));
}
</script>
<script>
// ══════════════════════════════════════════════════════
// CRM / LEADS
// ══════════════════════════════════════════════════════
function renderCRM(c,a){
  a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openModal(mNovoLead())"><i class="ti ti-plus"></i> Novo lead</button>';
  var etapas=ETAPAS;
  var kanban='<div class="kanban">';
  etapas.forEach(function(et){
    var leads=LEADS.filter(function(l){return l.etapa===et;});
    kanban+='<div class="kb-col"><div class="kb-hdr">'+etLbl(et)+' ('+leads.length+')</div>';
    leads.forEach(function(l){
      kanban+='<div class="kb-card" data-lid="'+l.id+'"><div class="kb-nome">'+l.nome+'</div>'
        +'<div class="kb-info">'+(l.email||'')+'</div>'
        +'<div class="kb-info" style="margin-top:4px">'+(l.origem?'📍 '+l.origem:'')+'</div></div>';
    });
    kanban+='</div>';
  });
  kanban+='</div>';
  c.innerHTML=kanban;
  c.querySelectorAll('.kb-card[data-lid]').forEach(function(el){
    el.addEventListener('click',function(){openLead(this.dataset.lid);});
  });
}

function mNovoLead(){
  return '<div class="mhdr"><h2>Novo lead</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fgrid"><div class="fg"><label>Nome</label><input id="nl-nome" placeholder="Nome completo"></div>'
    +'<div class="fg"><label>Email</label><input type="email" id="nl-email" placeholder="email@exemplo.com"></div></div>'
    +'<div class="fgrid"><div class="fg"><label>WhatsApp</label>'
    +'<div style="display:flex;gap:6px"><select id="nl-ddi" style="width:95px"><option value="+55">🇧🇷 +55</option><option value="+1">🇺🇸 +1</option><option value="+44">🇬🇧 +44</option><option value="+351">🇵🇹 +351</option><option value="+34">🇪🇸 +34</option></select>'
    +'<input id="nl-tel" placeholder="Número" style="flex:1"></div></div>'
    +'<div class="fg"><label>Origem</label><select id="nl-origem"><option value="Instagram">Instagram</option><option value="WhatsApp">WhatsApp</option><option value="Indicação">Indicação</option><option value="Google">Google</option><option value="Outro">Outro</option></select></div></div>'
    +'<div class="fgrid"><div class="fg"><label>Nível de inglês</label><select id="nl-nivel"><option value="">Não informado</option><option value="A1">A1</option><option value="A2">A2</option><option value="B1">B1</option><option value="B2">B2</option></select></div>'
    +'<div class="fg"><label>Objetivo</label><input id="nl-obj" placeholder="Ex: viagem, trabalho..."></div></div>'
    +'<div class="fg"><label>Observações</label><input id="nl-obs" placeholder="Obs..."></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="salvarLead()">Salvar lead</button></div>';
}

function salvarLead(){
  var nome=(document.getElementById('nl-nome').value||'').trim();
  if(!nome){showToast('Preencha o nome.');return;}
  var newLead={id:uuid(),nome:nome,email:document.getElementById('nl-email').value||'',
    ddi:document.getElementById('nl-ddi').value,tel:document.getElementById('nl-tel').value||'',
    origem:document.getElementById('nl-origem').value,nivel:document.getElementById('nl-nivel').value,
    objetivo:document.getElementById('nl-obj').value||'',obs:document.getElementById('nl-obs').value||'',
    etapa:'lead',data:new Date().toISOString().split('T')[0]};
  LEADS.push(newLead);
  salvarLeadDB(newLead);
  closeModal();showToast('Lead adicionado! ✅');
  renderCRM(document.getElementById('pc'),document.getElementById('tb-actions'));
}

function openLead(id){
  window._leadId=id;
  var l=LEADS.find(function(x){return x.id===id;});
  if(!l) return;
  openModal('<div class="mhdr"><h2>'+l.nome+'</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +bdg(etLbl(l.etapa))+'<br><br>'
    +'<div class="fst">Dados</div>'
    +'<div class="fgrid"><div class="fg"><label>Email</label><input readonly value="'+(l.email||'')+'"></div>'
    +'<div class="fg"><label>WhatsApp</label><input readonly value="'+(l.ddi||'+55')+' '+(l.tel||'')+'"></div></div>'
    +'<div class="fgrid"><div class="fg"><label>Origem</label><input readonly value="'+(l.origem||'')+'"></div>'
    +'<div class="fg"><label>Objetivo</label><input readonly value="'+(l.objetivo||'')+'"></div></div>'
    +'<div class="fst">Mover etapa</div>'
    +'<div class="fg"><label>Etapa</label><select id="et-lead">'
    +ETAPAS.map(function(e){return '<option value="'+e+'"'+(e===l.etapa?' selected':'')+'>'+etLbl(e)+'</option>';}).join('')
    +'</select></div>'
    +(l.etapa!=='matriculado'?'<div style="background:rgba(45,106,16,.07);border:1px solid rgba(45,106,16,.2);border-radius:9px;padding:12px;font-size:12px;color:#2d6a10;margin:12px 0">💡 Mova para "Matriculado" e crie o perfil automaticamente!</div>':'')
    +'<div class="mftr">'
    +'<button class="btn btn-ghost btn-sm" style="color:var(--crose)" id="btn-del-lead"><i class="ti ti-trash"></i></button>'
    +'<div style="flex:1"></div>'
    +(l.etapa!=='matriculado'?'<button class="btn btn-success" id="btn-matricular-lead">✅ Matricular e criar perfil</button>':'')
    +'<button class="btn btn-primary" id="btn-mover-etapa">Salvar etapa</button></div>');
  setTimeout(function(){
    var bm=document.getElementById('btn-matricular-lead');
    if(bm) bm.addEventListener('click',function(){matricularLead(window._leadId);});
    var bs=document.getElementById('btn-mover-etapa');
    if(bs) bs.addEventListener('click',function(){moverEtapa(window._leadId);});
    var bd=document.getElementById('btn-del-lead');
    if(bd) bd.addEventListener('click',async function(){
      if(confirm('Excluir este lead?')){
        var idParaDeletar=window._leadId;
        // Excluir do Supabase PRIMEIRO, aguardar confirmação
        if(sb){
          try{
            var result=await sb.from('leads').delete().eq('id',idParaDeletar);
            if(result.error){
              console.warn('Erro ao excluir lead do Supabase:',result.error);
              showToast('Erro ao excluir. Verifique o Supabase (RLS).');
              return;
            }
            // Verificar se realmente deletou (RLS pode bloquear silenciosamente)
            var check=await sb.from('leads').select('id').eq('id',idParaDeletar);
            if(check.data && check.data.length>0){
              console.warn('RLS pode estar bloqueando o delete. Lead ainda existe no banco.');
              showToast('Erro: lead não foi removido do banco. Verifique as políticas RLS no Supabase.');
              return;
            }
          }catch(e){
            console.warn('Erro ao excluir lead do Supabase:',e);
            showToast('Erro ao excluir. Tente novamente.');
            return;
          }
        }
        // Só remove da memória local APÓS confirmação do banco
        LEADS=LEADS.filter(function(x){return x.id!==idParaDeletar;});
        closeModal();showToast('Lead excluído. ✅');
        renderCRM(document.getElementById('pc'),document.getElementById('tb-actions'));
      }
    });
  },0);
}

function moverEtapa(id){
  var l=LEADS.find(function(x){return x.id===id;});if(!l) return;
  var s=document.getElementById('et-lead');if(s) l.etapa=s.value;
  salvarLeadDB(l);
  closeModal();showToast('Lead atualizado!');
  renderCRM(document.getElementById('pc'),document.getElementById('tb-actions'));
}

function matricularLead(id){
  var l=LEADS.find(function(x){return x.id===id;});if(!l) return;
  l.etapa='matriculado';
  salvarLeadDB(l);
  closeModal();
  // Abrir cadastro de aluna com dados do lead pré-preenchidos
  _horariosSelec=[];
  var tOpts=TEACHERS.slice().sort(function(a,b){return a.nome.localeCompare(b.nome,'pt');})
    .map(function(t){return '<option value="'+t.id+'">'+t.nome+'</option>';}).join('');
  var vOpts=VENC.map(function(d){return '<option value="'+d+'">Dia '+d+'</option>';}).join('');
  var html='<div class="mhdr"><h2>Matricular — '+l.nome+'</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fst">Dados pessoais</div>'
    +'<div class="fgrid"><div class="fg"><label>Nome</label><input id="ca-nome" value="'+l.nome+'"></div>'
    +'<div class="fg"><label>Email</label><input type="email" id="ca-email" value="'+(l.email||'')+'"></div></div>'
    +'<div class="fgrid"><div class="fg"><label>WhatsApp</label>'
    +'<div style="display:flex;gap:6px"><select id="ca-ddi" style="width:95px"><option value="+55">🇧🇷 +55</option><option value="+1">🇺🇸 +1</option><option value="+44">🇬🇧 +44</option><option value="+351">🇵🇹 +351</option><option value="+34">🇪🇸 +34</option></select>'
    +'<input id="ca-tel" value="'+(l.tel||'')+'" style="flex:1"></div></div>'
    +'<div class="fg"><label>Senha de acesso</label><input type="password" id="ca-senha" placeholder="Crie uma senha"></div></div>'
    +'<div class="fst">Dados pedagógicos</div>'
    +'<div class="fgrid"><div class="fg"><label>Nível</label><select id="ca-nivel"><option value="A1">A1</option><option value="A2">A2</option><option value="B1">B1</option><option value="B2">B2</option><option value="C1">C1</option><option value="C2">C2</option></select></div>'
    +'<div class="fg"><label>Teacher</label><select id="ca-teacher">'+tOpts+'</select></div></div>'
    +'<div class="fgrid"><div class="fg"><label>Aulas/semana</label><select id="ca-aulas-semana"><option value="1">1x</option><option value="2">2x</option><option value="3">3x</option><option value="4">4x</option><option value="5">5x</option></select></div>'
    +'<div class="fg"><label>Horários disponíveis</label><div id="ca-horarios-disp" style="background:rgba(121,20,40,.03);border-radius:8px;padding:8px;min-height:40px;font-size:11px;color:var(--crose)">Selecione uma teacher.</div></div></div>'
    +'<div class="fst">Financeiro</div>'
    +'<div class="fgrid"><div class="fg"><label>Plano</label><select id="ca-plano"><option value="Mensal">Mensal</option><option value="Trimestral">Trimestral</option><option value="Semestral">Semestral</option><option value="Anual">Anual</option><option value="Publicidade">🎁 Publicidade</option></select></div>'
    +'<div class="fg"><label>Valor R$</label><input type="number" id="ca-valor" value="320"></div>'
    +'<div class="fg"><label>Vencimento</label><select id="ca-venc">'+vOpts+'</select></div>'
    +'<div class="fg"><label>Financeiro</label><select id="ca-fin"><option value="Pendente">Pendente</option><option value="Pago">Pago</option></select></div></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="salvarAluna()">Matricular</button></div>';
  openModal(html);
  setTimeout(function(){
    var st=document.getElementById('ca-teacher');
    var sa=document.getElementById('ca-aulas-semana');
    if(st){st.addEventListener('change',atualizarHorariosDisp);atualizarHorariosDisp();}
    if(sa){sa.addEventListener('change',function(){_horariosSelec=[];atualizarHorariosDisp();});}
  },0);
}

function renderFunil(c,a){
  var etLabels=ETAPAS.map(function(e){return etLbl(e);});
  var counts=ETAPAS.map(function(e){return LEADS.filter(function(l){return l.etapa===e;}).length;});
  var total=LEADS.length||1;
  var cores=['#bc5572','#9b4060','#7a2f4e','#591e3c','#38102a','#888'];
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-filter"></i><h3>Funil de Vendas</h3></div>'
    +'<div style="display:flex;gap:10px;align-items:flex-end;height:200px;margin-bottom:16px">'
    +ETAPAS.map(function(e,i){
      var cnt=counts[i];
      var pct=Math.max(10,Math.round(cnt/total*100));
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'
        +'<div style="font-size:14px;font-weight:700;color:var(--cd)">'+cnt+'</div>'
        +'<div style="width:100%;background:'+cores[i]+';height:'+pct+'%;border-radius:6px 6px 0 0;transition:height .3s"></div>'
        +'<div style="font-size:9px;color:var(--crose);text-align:center">'+etLabels[i]+'</div></div>';
    }).join('')+'</div></div>';
}

function renderMatriculas(c,a){
  a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openCadastrarAluna()"><i class="ti ti-plus"></i> Nova matrícula</button>';
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-file-plus"></i><h3>Matrículas</h3></div>'
    +(ALUNOS.length?'<table class="tbl"><tr><th>Aluna</th><th>Teacher</th><th>Plano</th><th>Valor</th><th>Vencimento</th><th>Data</th><th></th></tr>'
      +byName(ALUNOS).map(function(al){
        return '<tr><td class="nm" data-alid="'+al.id+'">'+al.nome+'</td><td>'+getTeacher(al.teacherId).nome+'</td><td>'+al.plano+'</td><td>R$'+al.valor+'</td><td>Dia '+al.venc+'</td><td>'+al.matricula+'</td>'
          +'<td><button class="btn btn-ghost btn-sm" data-alid="'+al.id+'" onclick="openEditAluna(this.dataset.alid)"><i class="ti ti-pencil"></i></button></td></tr>';
      }).join('')+'</table>'
      :'<div style="text-align:center;padding:40px;color:var(--crose)">Nenhuma matrícula ainda.</div>')
    +'</div>';
}
</script>
<script>
// ══════════════════════════════════════════════════════
// AULAS / RELATÓRIOS
// ══════════════════════════════════════════════════════
var _aulasFiltroAluna='';
var _aulasFiltroTeacher='';
function renderAulas(c,a){
  a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openModal(mNovaAula())"><i class="ti ti-plus"></i> Registrar aula</button>';
  var myTeacherUUID=_teacherIdMap[S.teacherId]||S.teacherId;
  var listaBase=S.perfil==='teacher'
    ?AULAS.filter(function(r){return r.teacherId===myTeacherUUID||r.teacherId===S.teacherId;})
    :AULAS;

  // Filtro por teacher (gestão/pedagógico)
  var teacherOpts='';
  if(S.perfil!=='teacher'){
    teacherOpts='<option value="">Todas as teachers</option>'
      +TEACHERS.map(function(t){
        var tUUID=_teacherIdMap[t.id]||t.id;
        return '<option value="'+tUUID+'"'+((tUUID===_aulasFiltroTeacher||t.id===_aulasFiltroTeacher)?' selected':'')+'>'+t.nome+'</option>';
      }).join('');
  }

  // Filtro por aluna — filtrado pela teacher selecionada
  var alunosFiltrados=S.perfil!=='teacher'&&_aulasFiltroTeacher
    ?ALUNOS.filter(function(al){return al.teacherId===_aulasFiltroTeacher||_teacherIdMap[al.teacherId]===_aulasFiltroTeacher;})
    :myAlunos();
  var alunaOpts='<option value="">Todos os alunos</option>'
    +byName(alunosFiltrados).map(function(al){return '<option value="'+al.id+'"'+(al.id===_aulasFiltroAluna?' selected':'')+'>'+al.nome+'</option>';}).join('');

  // Aplicar filtros
  var lista=listaBase.slice();
  if(_aulasFiltroTeacher) lista=lista.filter(function(r){return r.teacherId===_aulasFiltroTeacher;});
  if(_aulasFiltroAluna)   lista=lista.filter(function(r){return r.alunoId===_aulasFiltroAluna;});
  lista.sort(function(a,b){return b.data.localeCompare(a.data);});

  var selectStyle='padding:7px 12px;border-radius:8px;border:1.5px solid rgba(121,20,40,.18);background:#fff;color:var(--cd);font-size:12px;font-family:var(--font-sans);outline:none';

  c.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">'
    +(S.perfil!=='teacher'?'<label style="font-size:11px;font-weight:700;color:var(--crose);white-space:nowrap">Teacher:</label>'
      +'<select id="filtro-teacher" style="'+selectStyle+'">'+teacherOpts+'</select>':'')
    +'<label style="font-size:11px;font-weight:700;color:var(--crose);white-space:nowrap">Aluno:</label>'
    +'<select id="filtro-aluna" style="'+selectStyle+'">'+alunaOpts+'</select>'
    +'<button class="btn btn-ghost btn-sm" onclick="limparFiltrosAulas()">Limpar</button>'
    +'</div>'
    +'<div class="card"><div class="ch"><i class="ti ti-book"></i><h3>Histórico de aulas ('+lista.length+')</h3></div>'
    +(lista.length
      ?lista.map(function(r){
          var al=ALUNOS.find(function(a){return a.id===r.alunoId;});
          var t=getTeacher(r.teacherId);
          var podeEditar=S.perfil==='teacher'||S.perfil==='gestao'||S.perfil==='pedagogico';
          return '<div style="border:1px solid rgba(121,20,40,.07);border-radius:10px;padding:14px;margin-bottom:10px;background:rgba(121,20,40,.02)">'
            +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
            +'<div>'
            +'<div style="font-weight:700;color:var(--cd);font-size:13px">'+(al?al.nome:'—')+'</div>'
            +(S.perfil!=='teacher'?'<div style="font-size:11px;color:var(--crose)">👩‍🏫 '+t.nome+'</div>':'')
            +'</div>'
            +'<div style="display:flex;gap:6px;align-items:center">'
            +'<span style="font-size:11px;color:var(--crose)">'+fmtDateBr(r.data)+'</span>'
            +bdg(r.presenca)
            +(r.reposicao?'<span style="font-size:10px;background:#fef3e0;color:#ca8a04;border-radius:4px;padding:1px 6px;font-weight:700">🔄 Reposição</span>':'')
            +(S.perfil==='gestao'||S.perfil==='financeiro'?'<span style="font-size:10px;background:rgba(121,20,40,.08);color:var(--cr);border-radius:4px;padding:1px 6px">R$ '+calcCustoAula(r)+'</span>':'')
            +(podeEditar?'<button class="btn btn-ghost btn-sm" onclick="openEditarAula(\''+r.id+'\')"><i class="ti ti-pencil"></i></button>':'')
            +(podeEditar?'<button class="btn btn-ghost btn-sm" style="color:var(--crose)" onclick="excluirAula(\''+r.id+'\')"><i class="ti ti-trash"></i></button>':'')
            +'</div>'
            +'</div>'
            +(r.conteudo?'<div style="font-size:12px;color:var(--cd);margin-bottom:4px">📖 <strong>Conteúdo:</strong> '+r.conteudo+'</div>':'')
            +(r.desempenho?'<div style="font-size:11px;color:var(--crose);margin-bottom:2px">⭐ Desempenho: '+r.desempenho+'</div>':'')
            +(r.speaking?'<div style="font-size:11px;color:var(--crose);margin-bottom:2px">🗣️ Speaking: '+r.speaking+'</div>':'')
            +(r.homework?'<div style="font-size:11px;color:var(--crose);margin-bottom:2px">📝 Homework: '+r.homework+'</div>':'')
            +((S.perfil==='teacher'||S.perfil==='gestao'||S.perfil==='pedagogico')&&r.dificuldades?'<div style="font-size:11px;color:#c0392b">⚠️ Dificuldades: '+r.dificuldades+'</div>':'')
            +((S.perfil==='teacher'||S.perfil==='gestao'||S.perfil==='pedagogico')&&r.obs?'<div style="font-size:11px;color:#666">💬 Obs: '+r.obs+'</div>':'')
            +'</div>';
        }).join('')

function contarReposicoesDoMes(alunoId){
  var hoje=new Date();
  var mes=hoje.getMonth(); var ano=hoje.getFullYear();
  return AULAS.filter(function(a){
    if(a.alunoId!==alunoId||!a.reposicao) return false;
    var d=new Date(a.data);
    return d.getMonth()===mes&&d.getFullYear()===ano;
  }).length;
}

function verificarLimiteReposicao(){
  var alunoId=(document.getElementById('na-aluno')||{value:''}).value;
  var cb=document.getElementById('na-reposicao');
  var cont=document.getElementById('rep-contador');
  if(!alunoId||!cont) return;
  var qtd=contarReposicoesDoMes(alunoId);
  cont.textContent=qtd+'/4 reposições este mês';
  cont.style.color=qtd>=4?'#dc2626':'var(--crose)';
  if(cb&&qtd>=4&&cb.checked){
    cb.checked=false;
    showToast('⚠️ Limite de 4 reposições mensais atingido para este aluno!');
  }
}

async function salvarAula(){
  var alunoId=document.getElementById('na-aluno').value;
  if(!alunoId){showToast('Selecione a aluna.');return;}
  // Resolver UUID do banco para o teacherId local
  var teacherUUID=await resolveTeacherId(S.teacherId)||S.teacherId||'';
  // Verificar limite de reposições
  var isReposicao=document.getElementById('na-reposicao')&&document.getElementById('na-reposicao').checked;
  if(isReposicao&&contarReposicoesDoMes(alunoId)>=4){
    showToast('⚠️ Limite de 4 reposições mensais atingido para este aluno!'); return;
  }
  var newAula={id:uuid(),alunoId:alunoId,teacherId:teacherUUID,reposicao:isReposicao,
    data:document.getElementById('na-data').value,
    presenca:document.getElementById('na-pres').value,
    conteudo:document.getElementById('na-cont').value||'',
    desempenho:document.getElementById('na-desemp').value,
    speaking:document.getElementById('na-speak').value,
    participacao:document.getElementById('na-part').value,
    homework:document.getElementById('na-hw').value||'',
    dificuldades:document.getElementById('na-dif').value||'',
    obs:document.getElementById('na-obs').value||''};
  // Atualizar presença da aluna
  var al=ALUNOS.find(function(a){return a.id===alunoId;});
  if(al&&newAula.presenca==='Faltou'){
    al.faltas=(al.faltas||0)+1;
    // Contar faltas SEGUIDAS
    var aulasOrdenadas=AULAS.filter(function(x){return x.alunoId===al.id;})
      .sort(function(a,b){return b.data.localeCompare(a.data);});
    var faltasSeguidas=0;
    for(var i=0;i<aulasOrdenadas.length;i++){
      if(aulasOrdenadas[i].presenca==='Faltou') faltasSeguidas++;
      else break;
    }
    faltasSeguidas++; // conta a aula atual
    if(faltasSeguidas>=4){
      al.status='Desaparecido';
      showToast('⚠️ '+al.nome+' marcado como DESAPARECIDO ('+faltasSeguidas+' faltas seguidas)');
    } else if(al.faltas>=2){
      if(al.status!=='Desaparecido') al.status='Atenção';
    }
    salvarAlunaDB(al);
  } else if(al&&newAula.presenca==='Presente'){
    // Ao retornar, limpar status de desaparecido/atenção se faltas ok
    if(al.status==='Desaparecido'||al.status==='Atenção'){
      al.status='Ativo';
      showToast('✅ '+al.nome+' voltou! Status restaurado para Ativo.');
      salvarAlunaDB(al);
    }
  }
  AULAS.unshift(newAula);
  salvarAulaDB(newAula);
  closeModal();showToast('Aula registrada! ✅');
  renderAulas(document.getElementById('pc'),document.getElementById('tb-actions'));
}
