function renderRetencao(c,a){
  var emRisco=ALUNOS.filter(function(al){
    return al.status==='Desaparecido'||al.status==='Atenção'||al.freq<85||(al.faltas||0)>=2||al.fin==='Atrasado'||al.risco!=='low';
  });
  // Desaparecidas primeiro, depois Atenção, depois o resto em ordem alfabética
  var peso={'Desaparecido':0,'Atenção':1};
  emRisco.sort(function(a,b){
    var pa=peso[a.status]!==undefined?peso[a.status]:2;
    var pb=peso[b.status]!==undefined?peso[b.status]:2;
    return pa!==pb?pa-pb:a.nome.localeCompare(b.nome,'pt');
  });
  function motivoRisco(al){
    var m=[];
    if(al.status==='Desaparecido')m.push('🚨 Desaparecida');
    if(al.status==='Atenção')m.push('⚠️ Atenção');
    if(al.freq<85)m.push('Freq. baixa');
    if((al.faltas||0)>=2)m.push((al.faltas)+' faltas');
    if(al.fin==='Atrasado')m.push('Inadimplente');
    if(al.risco!=='low'&&!m.length)m.push('Risco sinalizado');
    return m.join(' · ');
  }
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-heart"></i><h3>Alunas em risco ('+emRisco.length+')</h3></div>'
    +(emRisco.length?'<table class="tbl"><tr><th>Aluna</th><th>Teacher</th><th>Status</th><th>Freq.</th><th>Financeiro</th><th>Motivo</th></tr>'
      +emRisco.map(function(al){
        var destaque=al.status==='Desaparecido'?' style="background:rgba(239,68,68,.05)"':al.status==='Atenção'?' style="background:rgba(245,158,11,.05)"':'';
        return '<tr'+destaque+'><td class="nm" data-alid="'+al.id+'">'+al.nome+'</td><td>'+getTeacher(al.teacherId).nome+'</td><td>'+bdg(al.status)+'</td><td>'+al.freq+'%</td><td>'+bdg(al.fin)+'</td><td style="font-size:11px;color:var(--crose)">'+motivoRisco(al)+'</td></tr>';
      }).join('')+'</table>'
      :'<div style="text-align:center;padding:40px;color:var(--crose)">✅ Nenhuma aluna em risco!</div>')+'</div>';
}

function renderPagamentos(soloInadimplentes){
  var c=document.getElementById('pc');
  atualizarDiasInadimplente();
  // Filtrar: excluir desaparecidos e alunos com +15 dias atraso (só se não for aba inadimplência)
  var listaBase=ALUNOS.filter(function(a){
    if(!isPagante(a)) return false;
    if(a.status==='Desaparecido') return false;
    if(!soloInadimplentes && a.fin==='Atrasado' && a.diasInadimplente>15) return false;
    return true;
  });
  var lista=soloInadimplentes
    ?listaBase.filter(function(a){return a.fin==='Atrasado';})
    :listaBase;
  var total=ALUNOS.filter(isPagante).reduce(function(s,a){return s+(a.fin==='Pago'?a.valor:0);},0);
  var previsto=ALUNOS.filter(function(a){return a.status!=='Desaparecido'&&isPagante(a);}).reduce(function(s,a){return s+a.valor;},0);
  var inadimplentes=ALUNOS.filter(function(a){return a.fin==='Atrasado'&&isPagante(a);}).length;
  // Agrupar por vencimento
  var grupos=[5,10,15,20,30];
  var porVenc={};
  grupos.forEach(function(v){porVenc[v]=[];});
  lista.forEach(function(al){
    var v=parseInt(al.venc)||10;
    if(!porVenc[v]) porVenc[v]=[];
    porVenc[v].push(al);
  });
  // Ordenar cada grupo alfabeticamente
  grupos.forEach(function(v){
    porVenc[v].sort(function(a,b){return a.nome.localeCompare(b.nome,'pt');});
  });
  var tabelaHtml='';
  grupos.forEach(function(v){
    var gr=porVenc[v];
    if(!gr||!gr.length) return;
    tabelaHtml+='<tr><td colspan="6" style="background:rgba(121,20,40,.07);font-weight:700;font-size:12px;padding:8px 12px;color:var(--cr)">📅 Vencimento dia '+v+'</td></tr>';
    gr.forEach(function(al){
      var badge=al.desconto>0?'<span style="font-size:10px;background:#fef9c3;color:#854d0e;border-radius:4px;padding:1px 5px;margin-left:4px">-'+al.desconto+'%</span>':'';
      var valorStr='R$ '+al.valor+(al.desconto>0?' <span style="font-size:10px;color:#aaa;text-decoration:line-through">R$'+al.valorCheio+'</span>':'');
      var diasBadge=al.fin==='Atrasado'&&al.diasInadimplente?'<span style="font-size:10px;background:#fee2e2;color:#991b1b;border-radius:4px;padding:1px 5px;margin-left:4px">'+al.diasInadimplente+'d</span>':'';
      tabelaHtml+='<tr>'
        +'<td class="nm" data-alid="'+al.id+'">'+al.nome+badge+diasBadge+'</td>'
        +'<td>'+al.plano+'</td><td>'+valorStr+'</td><td>Dia '+al.venc+'</td><td>'+bdg(al.fin)+'</td>'
        +'<td style="display:flex;gap:4px">'
        +'<button class="btn btn-ghost btn-sm" data-alid="'+al.id+'" data-fin="Pago" onclick="marcarPgto(this)">✅ Pago</button>'
        +'<button class="btn btn-ghost btn-sm" data-alid="'+al.id+'" data-fin="Atrasado" onclick="marcarPgto(this)" style="color:var(--crose)">⚠️ Atrasar</button>'
        +'</td></tr>';
    });
  });
  c.innerHTML='<div class="sg g3">'
    +'<div class="sc"><div class="sl">Receita recebida</div><div class="sv">R$ '+total.toLocaleString('pt-BR')+'</div></div>'
    +'<div class="sc"><div class="sl">Previsto</div><div class="sv">R$ '+previsto.toLocaleString('pt-BR')+'</div></div>'
    +'<div class="sc warn"><div class="sl">Inadimplentes</div><div class="sv">'+inadimplentes+'</div></div>'
    +'</div>'
    +'<div class="card"><div class="ch"><i class="ti ti-cash"></i><h3>'+(soloInadimplentes?'Inadimplentes':'Mensalidades')+'</h3></div>'
    +(tabelaHtml?'<table class="tbl"><tr><th>Aluna</th><th>Plano</th><th>Valor</th><th>Vencimento</th><th>Status</th><th></th></tr>'+tabelaHtml+'</table>'
      :'<div style="text-align:center;padding:40px;color:var(--crose)">Nenhuma aluna no fluxo.</div>')+'</div>';
}

function marcarPgto(btn){
  var alid=btn.dataset.alid;var fin=btn.dataset.fin;
  var al=ALUNOS.find(function(a){return a.id===alid;});
  if(!al) return;
  al.fin=fin;
  if(fin==='Atrasado'){
    if(!al.dataAtraso) al.dataAtraso=new Date().toISOString().split('T')[0];
    al.diasInadimplente=calcDiasAtraso(al.dataAtraso);
    // Volta valor ao cheio se tem desconto
    if(al.desconto>0){ al.valor=al.valorCheio; showToast('⚠️ Desconto removido — valor voltou para R$ '+al.valor); }
    estornarPagamentoHoje(al.id);
  } else if(fin==='Pago'){
    al.dataAtraso=null; al.diasInadimplente=0;
    // Restaurar desconto se tinha
    if(al.desconto>0){ al.valor=Math.round(al.valorCheio*(1-al.desconto/100)); }
    registrarPagamento(al);
  }
  salvarAlunaDB(al);
  showToast('Status atualizado!');
  renderFinanceiro(document.getElementById('pc'),document.getElementById('tb-actions'));
}
function calcDiasAtraso(dataAtraso){
  if(!dataAtraso) return 0;
  var d=new Date(dataAtraso);var hoje=new Date();
  return Math.floor((hoje-d)/(1000*60*60*24));
}
// Atualizar dias inadimplente de todos os alunos ao carregar
function atualizarDiasInadimplente(){
  ALUNOS.forEach(function(al){
    if(al.fin==='Atrasado'&&al.dataAtraso){
      al.diasInadimplente=calcDiasAtraso(al.dataAtraso);
    }
  });
}

  atualizarDiasInadimplente();

        return '<tr style="background:rgba(239,68,68,.05)">'

          +'<td>R$ '+al.valor+'</td><td>Dia '+al.venc+'</td>'

function toggleNF(id){
  var al=ALUNOS.find(function(a){return a.id===id;});
  if(al){
    al.nfEmitida=!al.nfEmitida;
    salvarAlunaDB(al);
    showToast(al.nfEmitida?'NF marcada como emitida ✅':'NF desmarcada');
    renderNF(document.getElementById('pc'),document.getElementById('tb-actions'));
  }
}
function uploadNF(event,alunaId){
  var file=event.target.files[0];
  if(!file) return;
  if(file.type!=='application/pdf'){showToast('Apenas arquivos PDF são aceitos.');return;}
  var al=ALUNOS.find(function(a){return a.id===alunaId;});
  if(!al) return;
  var reader=new FileReader();
  reader.onload=function(e){
    al.nfUrl=e.target.result;
    al.nfEmitida=true;
    salvarAlunaDB(al);
    showToast('NF de '+al.nome+' anexada! ✅');

function abrirPerfilTeacher(teacherLocalId){
  var t=TEACHERS.find(function(x){return x.id===teacherLocalId;});

  var alunos=ALUNOS.filter(function(a){return a.teacherId===teacherLocalId||a.teacherId===tUUID;});
  var hoje=new Date();
  var aulasMes=AULAS.filter(function(a){
    if(a.teacherId!==teacherLocalId&&a.teacherId!==tUUID) return false;
    if(!a.data) return false;
    var d=new Date(a.data); return d.getMonth()===hoje.getMonth()&&d.getFullYear()===hoje.getFullYear();
  });

    +calcCustoMesTeacher(tUUID,hoje.getMonth(),hoje.getFullYear()));

    +'<div class="sc warn"><div class="sl">Custo previsto</div><div class="sv">R$ '+custoMes.toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div></div>'
    +'</div>'
    // Lista de alunos clicáveis
    +'<div style="font-size:12px;font-weight:700;color:var(--cr);margin-bottom:8px">👩‍🎓 Alunos (clique para ver histórico)</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">'
    +alunos.map(function(al){
      return '<button class="btn btn-ghost btn-sm" style="border:1px solid rgba(121,20,40,.2)" '
        +'onclick="closeModal();abrirPerfilAlunoCoord(\''+al.id+'\')">'+al.nome+'</button>';

    +'<div style="font-size:12px;font-weight:700;color:var(--cr);margin-bottom:8px">📖 Histórico recente</div>'
    +(aulasMes.length
      ?'<table class="tbl"><tr><th>Aluno</th><th>Data</th><th>Presença</th><th>Conteúdo</th></tr>'
       +aulasMes.slice().sort(function(a,b){return b.data.localeCompare(a.data);}).slice(0,10).map(function(a){
         var al2=ALUNOS.find(function(x){return x.id===a.alunoId;})||{nome:'—'};
         return '<tr><td class="nm" style="cursor:pointer;color:var(--cr)" onclick="closeModal();abrirPerfilAlunoCoord(\''+a.alunoId+'\')">'+al2.nome+'</td>'
           +'<td>'+fmtDateBr(a.data)+'</td><td>'+bdg(a.presenca)+'</td><td style="font-size:11px">'+a.conteudo+'</td></tr>';
       }).join('')+'</table>'

    +'</div>';
  openModal(html);
}

function abrirPerfilAlunoCoord(alunoId){
  var al=ALUNOS.find(function(a){return a.id===alunoId;});

  var t=getTeacher(al.teacherId);

    .sort(function(a,b){return b.data.localeCompare(a.data);});

    +'<div class="sc '+(al.faltas>3?'warn':'')+'" ><div class="sl">Faltas</div><div class="sv">'+al.faltas+'</div></div>'
    +'</div>'

    +'<span>'+bdg(al.status)+'</span>'
    +'<span style="color:var(--crose)">'+al.aulasSemana+'x/semana · '+al.tipo+'</span>'
    +'</div>'

    +(S.perfil==='gestao'||S.perfil==='financeiro'
      ?'<div style="font-size:11px;font-weight:700;color:var(--cr);text-transform:uppercase;margin:16px 0 8px">Financeiro</div>'
       +'<div class="sg g3" style="margin-bottom:16px">'

       +'<div class="sc"><div class="sl">Mensalidade</div><div class="sv" style="font-size:14px">R$ '+parseFloat(al.valor||0).toLocaleString("pt-BR",{minimumFractionDigits:2})+'</div></div>'
       +'<div class="sc '+(al.fin==='Atrasado'?'warn':al.fin==='Pago'?'ok':'')+'" ><div class="sl">Status fin.</div><div style="margin-top:6px">'+bdg(al.fin)+'</div></div>'

    +(aulasAluno.length
      ?'<div style="max-height:300px;overflow-y:auto">'
       +aulasAluno.map(function(r){
         return '<div style="border:1px solid rgba(121,20,40,.08);border-radius:8px;padding:10px;margin-bottom:6px">'
           +'<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
           +'<span style="font-size:12px;font-weight:700;color:var(--cd)">'+fmtDateBr(r.data)+'</span>'
           +bdg(r.presenca)+'</div>'

           +(r.desempenho?'<div style="font-size:11px;color:var(--crose)">⭐ '+r.desempenho+' · 🗣️ '+r.speaking+'</div>':'')
           +(r.homework?'<div style="font-size:11px;color:var(--crose)">📝 '+r.homework+'</div>':'')

  openModal(html);

function mEditMetas(){

    +'<div class="fgrid">'+items.map(function(it){var m=METAS[it.key]||{meta:0,atual:0};return '<div class="fg"><label>'+it.l+' (meta / atual)</label><div style="display:flex;gap:6px"><input type="number" id="mt-'+it.key+'-meta" value="'+m.meta+'" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid rgba(121,20,40,.18);font-family:var(--font-sans)" placeholder="Meta"><input type="number" id="mt-'+it.key+'-atual" value="'+m.atual+'" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid rgba(121,20,40,.18);font-family:var(--font-sans)" placeholder="Atual"></div></div>';}).join('')+'</div>'

function salvarMetas(){
  ['leads','matriculas','aulas_exp','followups','conversao'].forEach(function(k){

}

function salvarNota(){
  var titulo=(document.getElementById('nota-titulo').value||'').trim();
  if(!titulo){showToast('Coloque um título!');return;}
  var now=new Date();
  var criadoEm=now.toLocaleDateString('pt-BR')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var prazoEl=document.getElementById('nota-prazo');
  var prazo=prazoEl&&prazoEl.value?new Date(prazoEl.value+'T12:00').toLocaleDateString('pt-BR'):'';
  var urg=(document.getElementById('nota-urg')||{value:'media'}).value;
  var texto=(document.getElementById('nota-texto')||{value:''}).value;
  if(window._editNota!==undefined&&NOTAS[window._editNota]){
    var orig=NOTAS[window._editNota];
    NOTAS[window._editNota]={titulo:titulo,texto:texto,urgencia:urg,prazo:prazo,criadoEm:orig.criadoEm,resolvido:orig.resolvido};
  } else {
    NOTAS.unshift({titulo:titulo,texto:texto,urgencia:urg,prazo:prazo,criadoEm:criadoEm,resolvido:false});
  }
  window._editNota=undefined;
  closeModal();showToast('Nota salva! ✅');
  renderNotas(document.getElementById('pc'),document.getElementById('tb-actions'));
}
function editarNota(i){window._editNota=i;openModal(mNovaNota(i));}
function toggleResolvida(i){if(NOTAS[i]){NOTAS[i].resolvido=!NOTAS[i].resolvido;renderNotas(document.getElementById('pc'),document.getElementById('tb-actions'));}}
function excluirNota(i){if(confirm('Excluir?')){NOTAS.splice(i,1);renderNotas(document.getElementById('pc'),document.getElementById('tb-actions'));}}

// Ao marcar como Atrasado, valor volta ao original (sem desconto)
function marcarFinanceiro(alunaId, status){
  var al=ALUNOS.find(function(a){return a.id===alunaId;});
  if(!al) return;
  al.fin=status;
  if(status==='Atrasado' && al.desconto>0){
    // Volta ao valor cheio
    al.valor=al.valorCheio||al.valor;
    showToast('⚠️ Mensalidade atrasada — desconto removido, valor voltou para R$ '+al.valor);
  }
  salvarAlunaDB(al);
  renderFinanceiro(document.getElementById('pc'),document.getElementById('tb-actions'));
}

// TAREFAS (Diretoria + Pedagógico)
// ══════════════════════════════════════════════════════
function renderTarefas(c,a){
  a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openModal(mNovaTarefa())"><i class="ti ti-plus"></i> Nova tarefa</button>';
  if(!TAREFAS.length){
    c.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--crose)"><i class="ti ti-checklist" style="font-size:36px;display:block;margin-bottom:12px"></i>Nenhuma tarefa criada ainda.</div>';
    return;
  }
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-checklist"></i><h3>Tarefas</h3></div>'
    +TAREFAS.map(function(t){
      return '<div style="display:flex;align-items:center;gap:12px;padding:10px;background:rgba(121,20,40,.03);border-radius:9px;margin-bottom:8px;border:1px solid rgba(121,20,40,.07)">'
        +'<div style="flex:1">'
        +'<div style="font-size:13px;font-weight:700;color:var(--cd)">'+t.titulo+'</div>'
        +'<div style="font-size:11px;color:var(--crose);margin-top:2px">'+(t.descricao||'')+(t.prazo?' · Prazo: '+fmtDateBr(t.prazo):'')+'</div>'
        +'</div>'
        +bdg(t.status==='concluido'?'Pago':t.status==='andamento'?'Pendente':'Pendente')
        +'<button class="btn btn-ghost btn-sm" data-tarid="'+t.id+'" onclick="concluirTarefa(this.dataset.tarid)">'+(t.status==='concluido'?'↩':'✓')+'</button></div>';
    }).join('')+'</div>';
}
function mNovaTarefa(){
  return '<div class="mhdr"><h2>Nova tarefa</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Título</label><input id="ta-titulo" placeholder="Descreva a tarefa..."></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Descrição</label><input id="ta-desc" placeholder="Detalhes..."></div>'
    +'<div class="fgrid"><div class="fg"><label>Prioridade</label><select id="ta-prior"><option value="alta">Alta</option><option value="media" selected>Média</option><option value="baixa">Baixa</option></select></div>'
    +'<div class="fg"><label>Prazo</label><input type="date" id="ta-prazo"></div></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="salvarTarefa()">Salvar</button></div>';
}
function salvarTarefa(){
  var titulo=(document.getElementById('ta-titulo').value||'').trim();
  if(!titulo){showToast('Coloque um título.');return;}
  var novaTarefa={id:uuid(),titulo:titulo,descricao:document.getElementById('ta-desc').value||'',
    prioridade:document.getElementById('ta-prior').value,prazo:document.getElementById('ta-prazo').value||'',
    status:'pendente',criadorNome:S.userName};
  TAREFAS.push(novaTarefa);salvarTarefaDB(novaTarefa);closeModal();showToast('Tarefa criada! ✅');
  renderTarefas(document.getElementById('pc'),document.getElementById('tb-actions'));
}
function concluirTarefa(id){
  var t=TAREFAS.find(function(x){return x.id===id;});
  if(t){t.status=t.status==='concluido'?'pendente':'concluido';salvarTarefaDB(t);renderTarefas(document.getElementById('pc'),document.getElementById('tb-actions'));}
}
</script>
<script>
// ══════════════════════════════════════════════════════
// ÁREA DA ALUNA
// ══════════════════════════════════════════════════════
function renderAluTabs(){
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});
  var temPlano=al&&al.planoHtml;
  var tabs=[{id:'dashboard',l:'🏠 Início'},{id:'minhas-aulas',l:'📖 Minhas Aulas'},
    {id:'progresso',l:'📊 Progresso'},{id:'materiais',l:'📁 Materiais'},
    {id:'extras',l:'🎬 Aulas Extras'},{id:'financeiro',l:'💰 Financeiro'}].concat(temPlano?[{id:'plano',l:'📚 Meu Plano'}]:[]);
  var div=document.getElementById('alu-tabs');
  div.innerHTML='';
  tabs.forEach(function(t){
    var btn=document.createElement('button');
    btn.className='alu-tab'+(t.id==='dashboard'?' active':'');
    btn.textContent=t.l;
    btn.dataset.pg=t.id;
    btn.addEventListener('click',function(){goAluPage(this.dataset.pg);});
    div.appendChild(btn);
  });
}

function goAluPage(id){
  document.querySelectorAll('.alu-tab').forEach(function(b){b.classList.toggle('active',b.dataset.pg===id);});
  var c=document.getElementById('alu-pc');
  var pages={dashboard:renderAluDash,'minhas-aulas':renderAluAulas,progresso:renderAluProgresso,
    materiais:renderAluMateriais,extras:renderAluExtras,financeiro:renderAluFinanceiro,plano:renderAluPlano};
  (pages[id]||function(c){c.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--crose)">Em breve!</div>';})(c);
}

function renderAluDash(c){
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});if(!al) return;
  var mv=motiv();
  var teacher=getTeacher(al.teacherId);
  // Horários da aluna
  var horariosAluna=Object.keys(HORARIOS).filter(function(k){return HORARIOS[k].alunoId===al.id;});
  var horariosHtml='';
  if(horariosAluna.length){
    horariosHtml='<div class="card" style="margin-bottom:14px"><div class="ch"><i class="ti ti-calendar-time"></i><h3>Meus horários de aula</h3></div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:8px">'
      +horariosAluna.map(function(k){
        var p=k.split('_');var dia=p[1];var hora=p[2];
        return '<div style="background:linear-gradient(135deg,var(--cd),var(--cr));border-radius:10px;padding:12px 16px;color:var(--ccream)">'
          +'<div style="font-size:14px;font-weight:700">'+hora+'</div>'
          +'<div style="font-size:11px;opacity:.8">'+fmtDateBr(dia)+'</div>'
          +'</div>';
      }).join('')+'</div></div>';
  }
  c.innerHTML='<div class="alu-hero">'
    +'<div class="alu-hero-welcome">✨ Bem-vinda de volta,</div>'
    +'<div class="alu-hero-name">'+al.nome.split(' ')[0]+'!</div>'
    +'<div class="alu-hero-stats">'
    +'<div><div class="alu-hero-stat-v">'+al.nivel+'</div><div class="alu-hero-stat-l">Nível</div></div>'
    +'<div><div class="alu-hero-stat-v">'+al.freq+'%</div><div class="alu-hero-stat-l">Frequência</div></div>'
    +'<div><div class="alu-hero-stat-v">'+bdg(al.fin)+'</div><div class="alu-hero-stat-l">Pagamento</div></div>'
    +'</div></div>'
    +horariosHtml
    +'<div class="motiv-card"><span class="motiv-emoji">'+mv.emoji+'</span><div class="motiv-txt">"'+mv.txt+'"</div><div class="motiv-sub">'+mv.sub+'</div></div>'
    +'<div class="card"><div class="ch"><i class="ti ti-school"></i><h3>Minha teacher</h3></div>'
    +'<div style="font-size:16px;font-weight:700;color:var(--cd)">'+teacher.nome+'</div>'
    +'<div style="font-size:12px;color:var(--crose);margin-top:4px">'+al.aulasSemana+'x por semana</div></div>';
}

function renderAluAulas(c){
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});if(!al) return;
  var aulas=AULAS.filter(function(r){return r.alunoId===al.id;}).sort(function(a,b){return b.data.localeCompare(a.data);});
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-book"></i><h3>Histórico de aulas</h3></div>'
    +(aulas.length?aulas.map(function(r){
      return '<div style="padding:14px;background:rgba(121,20,40,.03);border-radius:10px;margin-bottom:10px;border:1px solid rgba(121,20,40,.07)">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
        +'<div style="font-weight:700;color:var(--cd)">'+fmtDateBr(r.data)+'</div>'+bdg(r.presenca)+'</div>'
        +(r.conteudo?'<div style="font-size:12px;color:var(--cd);margin-bottom:4px">📖 '+r.conteudo+'</div>':'')
        +(r.desempenho?'<div style="font-size:11px;color:var(--crose)">Desempenho: '+r.desempenho+'</div>':'')
        +(r.homework?'<div style="font-size:11px;color:var(--crose)">Homework: '+r.homework+'</div>':'')
        +'</div>';
    }).join(''):'<div style="text-align:center;padding:40px;color:var(--crose)">Nenhuma aula registrada ainda.</div>')+'</div>';
}

function renderAluProgresso(c){
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});if(!al) return;
  var aulas=AULAS.filter(function(r){return r.alunoId===al.id&&r.presenca==='Presente';}).length;
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-chart-bar"></i><h3>Meu progresso</h3></div>'
    +'<div class="sg g3">'
    +'<div class="sc"><div class="sl">Nível atual</div><div class="sv">'+al.nivel+'</div></div>'
    +'<div class="sc"><div class="sl">Aulas feitas</div><div class="sv">'+aulas+'</div></div>'
    +'<div class="sc"><div class="sl">Frequência</div><div class="sv">'+al.freq+'%</div></div>'
    +'</div></div>';
}

function renderAluPlano(c){
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});
  if(!al||!al.planoHtml){
    c.innerHTML='<div class="card" style="text-align:center;padding:60px;color:var(--crose)">'
      +'<i class="ti ti-notebook" style="font-size:48px;display:block;margin-bottom:12px"></i>'
      +'<div style="font-size:14px;font-weight:600;color:var(--cd)">Nenhum plano de estudos</div>'
      +'<div style="font-size:12px;margin-top:6px">Seu plano de estudos aparecerá aqui quando sua teacher carregar.</div></div>';
    return;
  }
  var prog=al.planoProgresso||[];
  var pct=al.planoHtml?Math.round(prog.length/30*100):0;
  c.innerHTML='<div class="card" style="padding:0;overflow:hidden">'
    +'<div style="padding:14px 18px;border-bottom:1px solid rgba(121,20,40,.1);display:flex;align-items:center;gap:12px">'
    +'<div style="flex:1"><div style="font-size:12px;font-weight:700;color:var(--cr);margin-bottom:4px">📚 Meu Plano de Estudos</div>'
    +'<div style="background:rgba(121,20,40,.1);border-radius:99px;height:6px;overflow:hidden">'
    +'<div style="background:var(--cr);height:100%;border-radius:99px;width:'+pct+'%;transition:width .4s"></div></div></div>'
    +'<div style="font-size:13px;font-weight:700;color:var(--cr)">'+pct+'%</div></div>'
    +'<iframe id="plano-frame" style="width:100%;height:82vh;border:none" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>'
    +'</div>';
  // Injetar HTML no iframe + sincronizar progresso
  setTimeout(function(){
    var iframe=document.getElementById('plano-frame');
    if(!iframe) return;
    var doc=iframe.contentDocument||iframe.contentWindow.document;
    // Modificar o HTML do plano para usar progresso salvo
    var planoMod=al.planoHtml.replace(
      'var done = new Set();',
      'var done = new Set('+JSON.stringify(prog)+');'
    ).replace(
      'function toggleDone(d){if(done.has(d))done.delete(d);else done.add(d);renderAll();}',
      'function toggleDone(d){if(done.has(d))done.delete(d);else done.add(d);renderAll();window.parent.postMessage({type:\'plano-progresso\',done:Array.from(done)},"*");}'
    );
    doc.open(); doc.write(planoMod); doc.close();
  },100);
}
// Ouvir mensagens de progresso do iframe
window.addEventListener('message',function(e){
  if(!e.data||e.data.type!=='plano-progresso') return;
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});
  if(!al) return;
  al.planoProgresso=e.data.done||[];
  salvarAlunaDB(al);
  // Atualizar barra de progresso
  var pct=Math.round(al.planoProgresso.length/30*100);
  var bar=document.querySelector('#plano-frame').previousElementSibling;
  if(bar){
    var fill=bar.querySelector('div[style*="background:var(--cr)"]');
    var pctEl=bar.nextElementSibling;
    if(fill) fill.style.width=pct+'%';
  }
});
// ── LIVROS ──────────────────────────────────────────────
async function carregarLivrosDB(){
  if(!sb) return;
  try{
    var r=await sb.from('livros').select('*');
    if(r.data) LIVROS=r.data.map(function(l){
      return {id:l.id,titulo:l.titulo,nivel:l.nivel||'',link:l.link,
        liberadoPara:l.liberado_para||[],addedBy:l.added_by||''};
    });
  }catch(e){ console.warn('Livros: tabela pode não existir ainda',e); }
}

async function salvarLivroDB(l){
  if(!sb) return;
  try{
    var r=await sb.from('livros').upsert({
      id:l.id,titulo:l.titulo,nivel:l.nivel||'',link:l.link,
      liberado_para:l.liberadoPara||[],added_by:l.addedBy||''
    },{onConflict:'id'});
    if(r.error) console.warn('Erro salvar livro:',r.error.message);
  }catch(e){ console.warn('Erro salvarLivroDB:',e); }
}

function renderLivros(c,a){
  var podeGerenciar=S.perfil==='gestao'||S.perfil==='pedagogico'||S.perfil==='teacher';
  if(podeGerenciar){
    a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openAdicionarLivro()"><i class="ti ti-plus"></i> Adicionar livro</button>';
  }
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-book-2"></i><h3>Biblioteca de Livros</h3></div>'
    +(LIVROS.length
      ?'<table class="tbl"><tr><th>Título</th><th>Nível</th><th>Alunos liberados</th><th></th></tr>'
       +LIVROS.map(function(l){
         var liberados=l.liberadoPara||[];
         var nomesLib=liberados.map(function(id){
           var al=ALUNOS.find(function(a){return a.id===id;});
           return al?al.nome:'';
         }).filter(Boolean).join(', ')||'Nenhum';
         return '<tr>'
           +'<td class="nm">'+l.titulo+'</td>'
           +'<td>'+l.nivel+'</td>'
           +'<td style="font-size:11px;color:var(--crose)">'+nomesLib+'</td>'
           +'<td style="display:flex;gap:4px">'
           +(podeGerenciar?'<button class="btn btn-ghost btn-sm" onclick="openLiberarLivro(\''+l.id+'\')"><i class="ti ti-user-plus"></i> Liberar</button>':'')
           +(podeGerenciar?'<button class="btn btn-ghost btn-sm" style="color:var(--crose)" onclick="removerLivro(\''+l.id+'\')"><i class="ti ti-trash"></i></button>':'')
           +'</td></tr>';
       }).join('')+'</table>'
      :'<div style="text-align:center;padding:40px;color:var(--crose)">Nenhum livro cadastrado ainda.</div>')
    +'</div>';
}

function openAdicionarLivro(){
  var html='<div class="mhdr"><h2>Adicionar livro</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fg"><label>Título</label><input id="liv-titulo" placeholder="Ex: English File Beginner"></div>'
    +'<div class="fgrid"><div class="fg"><label>Nível</label><select id="liv-nivel"><option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option></select></div>'
    +'<div class="fg"><label>Link do Google Drive</label><input id="liv-link" placeholder="https://drive.google.com/..."></div></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="adicionarLivro()">Salvar</button></div>';
  openModal(html);
}

async function adicionarLivro(){
  var titulo=(document.getElementById('liv-titulo')||{value:''}).value.trim();
  var nivel=(document.getElementById('liv-nivel')||{value:'A1'}).value;
  var link=(document.getElementById('liv-link')||{value:''}).value.trim();
  if(!titulo||!link){showToast('Preencha título e link.');return;}
  var l={id:uuid(),titulo:titulo,nivel:nivel,link:link,liberadoPara:[],addedBy:S.userName||''};
  LIVROS.push(l);
  await salvarLivroDB(l);
  showToast('Livro adicionado! ✅');
  closeModal();
  renderLivros(document.getElementById('pc'),document.getElementById('tb-actions'));
}

function openLiberarLivro(livroId){
  var l=LIVROS.find(function(x){return x.id===livroId;});
  if(!l) return;
  var meusAlunos=S.perfil==='teacher'
    ?ALUNOS.filter(function(a){var tid=_teacherIdMap[S.teacherId]||S.teacherId;return a.teacherId===tid||a.teacherId===S.teacherId;})
    :ALUNOS;
  var html='<div class="mhdr"><h2>Liberar — '+l.titulo+'</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div style="padding:14px 0"><div style="font-size:12px;font-weight:700;color:var(--crose);margin-bottom:10px">Selecione os alunos que terão acesso:</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto">'
    +byName(meusAlunos).map(function(al){
      var checked=(l.liberadoPara||[]).includes(al.id);
      return '<label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(121,20,40,.03);cursor:pointer">'
        +'<input type="checkbox" value="'+al.id+'" '+(checked?'checked':'')+' style="width:15px;height:15px">'
        +'<span style="font-size:13px;color:var(--cd)">'+al.nome+'</span>'
        +'<span style="font-size:11px;color:var(--crose);margin-left:auto">'+al.nivel+'</span>'
        +'</label>';
    }).join('')
    +'</div></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="salvarLiberacao(\''+livroId+'\')">Salvar</button></div>';
  openModal(html);
}

async function salvarLiberacao(livroId){
  var l=LIVROS.find(function(x){return x.id===livroId;});
  if(!l) return;
  var checks=document.querySelectorAll('input[type=checkbox]:not(#na-reposicao)');
  l.liberadoPara=Array.from(checks).filter(function(c){return c.checked&&c.value!=='on';}).map(function(c){return c.value;});
  await salvarLivroDB(l);
  showToast('Acesso atualizado! ✅');
  closeModal();
  renderLivros(document.getElementById('pc'),document.getElementById('tb-actions'));
}

async function removerLivro(livroId){
  if(!confirm('Remover este livro?')) return;
  if(sb){ try{ await sb.from('livros').delete().eq('id',livroId); }catch(e){} }
  LIVROS=LIVROS.filter(function(l){return l.id!==livroId;});
  showToast('Livro removido.');
  renderLivros(document.getElementById('pc'),document.getElementById('tb-actions'));
}

function renderAluMateriais(c){
  var al=ALUNOS.find(function(a){return a.id===S.alunoId;});
  var meuId=al?al.id:'';
  var meusLivros=LIVROS.filter(function(l){return (l.liberadoPara||[]).includes(meuId);});
  c.innerHTML='<div class="card"><div class="ch"><i class="ti ti-book-2"></i><h3>📚 Meus Livros</h3></div>'
    +(meusLivros.length
      ?'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:0 16px 16px">'
       +meusLivros.map(function(l){
         return '<div style="background:rgba(121,20,40,.04);border-radius:10px;padding:16px;border:1px solid rgba(121,20,40,.1)">'
           +'<i class="ti ti-book-2" style="font-size:28px;color:var(--cr);display:block;margin-bottom:8px"></i>'
           +'<div style="font-size:13px;font-weight:700;color:var(--cd);margin-bottom:4px">'+l.titulo+'</div>'
           +'<div style="font-size:11px;color:var(--crose);margin-bottom:12px">Nível '+l.nivel+'</div>'
           +'<a href="'+l.link+'" target="_blank" class="btn btn-primary btn-sm" style="width:100%;text-align:center"><i class="ti ti-download"></i> Acessar livro</a>'
           +'</div>';
       }).join('')+'</div>'

function renderAluFinanceiro(c){

    +'</div>'
    +'<div style="font-size:12px;color:var(--crose);padding:10px 0">Vencimento: dia '+al.venc+' de cada mês</div></div>';

<script>
// ══════════════════════════════════════════════════════
// MÓDULOS: SUPORTE / COBRANÇA / EXPERIÊNCIA

var SUPORTE=[],COBRANCA=[],EXPERIENCIA=[];

// ── Selo de versão (para conferir se o deploy atualizou) ──
var BUILD_VERSAO='v17.jul.B';
(function(){

// ── Estilos (nomes clicáveis + módulos) ──
(function(){

// ── Nome de aluna clicável abre o perfil (só Diretoria) ──
document.addEventListener('click',function(e){

// ── Navegação e títulos ──
NAVS.gestao.push({s:'Suporte & Experiência'},
  {id:'suporte',l:'Central de Suporte',ic:'ti-lifebuoy',n:function(){return SUPORTE.filter(function(t){return t.status!=='resolvido';}).length;}},
  {id:'cobranca',l:'Contatos de Cobrança',ic:'ti-phone-call'},
  {id:'experiencia',l:'Experiência das Alunas',ic:'ti-mood-smile'});
NAVS.financeiro.push({s:'Cobrança & Suporte'},
  {id:'cobranca',l:'Contatos de Cobrança',ic:'ti-phone-call'},
  {id:'suporte',l:'Central de Suporte',ic:'ti-lifebuoy',n:function(){return SUPORTE.filter(function(t){return t.status!=='resolvido';}).length;}});
NAVS.comercial.push({s:'Suporte'},
  {id:'suporte',l:'Central de Suporte',ic:'ti-lifebuoy',n:function(){return SUPORTE.filter(function(t){return t.status!=='resolvido';}).length;}});
NAVS.pedagogico.push({s:'Suporte & Experiência'},
  {id:'suporte',l:'Central de Suporte',ic:'ti-lifebuoy',n:function(){return SUPORTE.filter(function(t){return t.status!=='resolvido';}).length;}},
  {id:'experiencia',l:'Experiência das Alunas',ic:'ti-mood-smile'});
TITLES.suporte='Central de Suporte';
TITLES.cobranca='Contatos de Cobrança';
TITLES.experiencia='Experiência das Alunas';

// ── Helpers ──
function getAluno(id){return ALUNOS.find(function(a){return a.id===id;})||{nome:'—'};}
function alunaOpts(sel,lista){
  return byName(lista||ALUNOS).map(function(a){
    return '<option value="'+a.id+'"'+(a.id===sel?' selected':'')+'>'+a.nome+'</option>';
  }).join('');
}
function hojeISO(){return new Date().toISOString().split('T')[0];}
function diasDesde(iso){
  if(!iso)return 0;
  return Math.max(0,Math.floor((new Date()-new Date(iso))/(1000*60*60*24)));
}

// ── Supabase: carregar / salvar ──
async function carregarModulosExtrasDB(){
  if(!sb)return;
  try{var r1=await sb.from('suporte').select('*');
    if(r1.data&&r1.data.length)SUPORTE=r1.data.map(mapSuporte);
    if(r1.error)console.warn('Tabela suporte:',r1.error.message);
  }catch(e){console.warn('suporte:',e);}
  try{var r2=await sb.from('cobranca').select('*');
    if(r2.data&&r2.data.length)COBRANCA=r2.data.map(mapCobranca);
    if(r2.error)console.warn('Tabela cobranca:',r2.error.message);
  }catch(e){console.warn('cobranca:',e);}
  try{var r3=await sb.from('experiencia').select('*');
    if(r3.data&&r3.data.length)EXPERIENCIA=r3.data.map(mapExperiencia);
    if(r3.error)console.warn('Tabela experiencia:',r3.error.message);
  }catch(e){console.warn('experiencia:',e);}
  try{var r4=await sb.from('relatorios').select('*');
    if(r4.data&&r4.data.length)RELATORIOS=r4.data.map(mapRelatorio);
    if(r4.error)console.warn('Tabela relatorios:',r4.error.message);
  }catch(e){console.warn('relatorios:',e);}
  try{var r5=await sb.from('pagamentos').select('*');
    if(r5.data&&r5.data.length)PAGAMENTOS=r5.data.map(function(p){return {id:p.id,alunoId:p.aluno_id||'',valor:parseFloat(p.valor||0),data:p.data||''};});
    if(r5.error)console.warn('Tabela pagamentos:',r5.error.message);
  }catch(e){console.warn('pagamentos:',e);}
}
function mapSuporte(r){
  return {id:r.id,alunoId:r.aluno_id||'',data:r.data||'',canal:r.canal||'WhatsApp',
    categoria:r.categoria||'Outro',descricao:r.descricao||'',responsavel:r.responsavel||'',
    status:r.status||'aberto',resolucao:r.resolucao||'',dataResolucao:r.data_resolucao||null,
    criadorNome:r.criador_nome||''};
}
function mapCobranca(r){
  return {id:r.id,alunoId:r.aluno_id||'',data:r.data||'',canal:r.canal||'WhatsApp',
    resumo:r.resumo||'',retorno:r.retorno||'Sem resposta',retornoDetalhe:r.retorno_detalhe||'',
    proximaAcao:r.proxima_acao||'',proximaData:r.proxima_data||null,criadorNome:r.criador_nome||''};
}
function mapExperiencia(r){
  return {id:r.id,alunoId:r.aluno_id||'',data:r.data||'',tipo:r.tipo||'checkin',
    humor:r.humor||'',nota:(r.nota===0||r.nota)?r.nota:null,comentario:r.comentario||'',
    criadorNome:r.criador_nome||''};
}
async function salvarSuporteDB(t){
  if(!sb)return;
  try{
    var p={aluno_id:t.alunoId,data:t.data,canal:t.canal,categoria:t.categoria,
      descricao:t.descricao,responsavel:t.responsavel,status:t.status,
      resolucao:t.resolucao||'',data_resolucao:t.dataResolucao||null,criador_nome:t.criadorNome||''};
    if(t.id&&String(t.id).length===36)p.id=t.id;
    var r=await sb.from('suporte').upsert(p,{onConflict:'id'});
    if(r.error)console.warn('Erro salvar suporte:',r.error.message);
  }catch(e){console.warn('salvarSuporteDB:',e);}
}
async function salvarCobrancaDB(t){
  if(!sb)return;
  try{
    var p={aluno_id:t.alunoId,data:t.data,canal:t.canal,resumo:t.resumo,
      retorno:t.retorno,retorno_detalhe:t.retornoDetalhe||'',
      proxima_acao:t.proximaAcao||'',proxima_data:t.proximaData||null,criador_nome:t.criadorNome||''};
    if(t.id&&String(t.id).length===36)p.id=t.id;
    var r=await sb.from('cobranca').upsert(p,{onConflict:'id'});
    if(r.error)console.warn('Erro salvar cobranca:',r.error.message);
  }catch(e){console.warn('salvarCobrancaDB:',e);}
}
async function salvarExperienciaDB(t){
  if(!sb)return;
  try{
    var p={aluno_id:t.alunoId,data:t.data,tipo:t.tipo,humor:t.humor||'',
      nota:(t.nota===0||t.nota)?t.nota:null,comentario:t.comentario||'',criador_nome:t.criadorNome||''};
    if(t.id&&String(t.id).length===36)p.id=t.id;
    var r=await sb.from('experiencia').upsert(p,{onConflict:'id'});
    if(r.error)console.warn('Erro salvar experiencia:',r.error.message);
  }catch(e){console.warn('salvarExperienciaDB:',e);}
}

// ══════════════════════════════════════════════════════
// CENTRAL DE SUPORTE
// ══════════════════════════════════════════════════════
var _supFiltro='ativos';
function renderSuporte(c,a){
  a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openModal(mNovoChamado())"><i class="ti ti-plus"></i> Novo chamado</button>';
  var abertos=SUPORTE.filter(function(t){return t.status==='aberto';});
  var andamento=SUPORTE.filter(function(t){return t.status==='andamento';});
  var resolvidos=SUPORTE.filter(function(t){return t.status==='resolvido';});
  var maisAntigo=abertos.concat(andamento).reduce(function(m,t){var d=diasDesde(t.data);return d>m?d:m;},0);
  var lista=_supFiltro==='ativos'?SUPORTE.filter(function(t){return t.status!=='resolvido';})
    :_supFiltro==='todos'?SUPORTE.slice()
    :SUPORTE.filter(function(t){return t.status===_supFiltro;});
  lista.sort(function(x,y){return (y.data||'').localeCompare(x.data||'');});
  var catEmoji={'Financeiro':'💰','Técnico':'🔧','Reposição':'🔁','Reclamação':'⚠️','Horário':'🕐','Outro':'📌'};
  c.innerHTML='<div class="sg g4">'
    +'<div class="sc '+(abertos.length?'warn':'ok')+'"><div class="sl">Abertos</div><div class="sv">'+abertos.length+'</div></div>'
    +'<div class="sc"><div class="sl">Em andamento</div><div class="sv">'+andamento.length+'</div></div>'
    +'<div class="sc ok"><div class="sl">Resolvidos</div><div class="sv">'+resolvidos.length+'</div></div>'
    +'<div class="sc '+(maisAntigo>2?'warn':'')+'"><div class="sl">Mais antigo sem resolver</div><div class="sv">'+maisAntigo+'d</div></div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:12px">'
    +[['ativos','Ativos'],['aberto','Abertos'],['andamento','Em andamento'],['resolvido','Resolvidos'],['todos','Todos']].map(function(f){
      return '<button class="btn btn-sm '+(_supFiltro===f[0]?'btn-primary':'btn-ghost')+'" onclick="_supFiltro=\''+f[0]+'\';goPage(\'suporte\')">'+f[1]+'</button>';
    }).join('')+'</div>'
    +'<div class="card"><div class="ch"><i class="ti ti-lifebuoy"></i><h3>Chamados ('+lista.length+')</h3></div>'
    +(lista.length?'<table class="tbl"><tr><th>Aluna</th><th>Data</th><th>Assunto</th><th>Responsável</th><th>Status</th><th></th></tr>'
      +lista.map(function(t){
        var al=getAluno(t.alunoId);
        var dias=diasDesde(t.data);
        var stBdg=t.status==='resolvido'?'<span style="font-size:11px;background:#dcfce7;color:#166534;border-radius:6px;padding:2px 8px;font-weight:700">✅ Resolvido</span>'
          :t.status==='andamento'?'<span style="font-size:11px;background:#fef9c3;color:#854d0e;border-radius:6px;padding:2px 8px;font-weight:700">🔄 Em andamento</span>'
          :'<span style="font-size:11px;background:#fee2e2;color:#991b1b;border-radius:6px;padding:2px 8px;font-weight:700">🔴 Aberto'+(dias>0?' ('+dias+'d)':'')+'</span>';
        return '<tr>'
          +'<td class="nm" data-alid="'+al.id+'">'+al.nome+'</td>'
          +'<td style="font-size:12px">'+fmtDateBr(t.data)+'</td>'
          +'<td><div style="font-size:12px;font-weight:700">'+(catEmoji[t.categoria]||'📌')+' '+t.categoria+'</div>'
          +'<div style="font-size:11px;color:var(--crose)">'+t.descricao+'</div>'
          +(t.status==='resolvido'&&t.resolucao?'<div style="font-size:11px;color:#166534;margin-top:2px">✔ '+t.resolucao+'</div>':'')
          +'</td>'
          +'<td style="font-size:12px">'+(t.responsavel||'—')+'</td>'
          +'<td>'+stBdg+'</td>'
          +'<td style="display:flex;gap:4px">'
          +(t.status==='aberto'?'<button class="btn btn-ghost btn-sm" onclick="mudarStatusChamado(\''+t.id+'\',\'andamento\')">🔄 Iniciar</button>':'')
          +(t.status!=='resolvido'?'<button class="btn btn-ghost btn-sm" onclick="openModal(mResolverChamado(\''+t.id+'\'))">✅ Resolver</button>':'')
          +'</td></tr>';
      }).join('')+'</table>'
      :'<div style="text-align:center;padding:40px;color:var(--crose)">Nenhum chamado nesse filtro. 🎉</div>')+'</div>';
}
function mNovoChamado(){
  return '<div class="mhdr"><h2>Novo chamado de suporte</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="fgrid"><div class="fg"><label>Aluna</label><select id="su-aluna">'+alunaOpts()+'</select></div>'
    +'<div class="fg"><label>Data</label><input type="date" id="su-data" value="'+hojeISO()+'"></div></div>'
    +'<div class="fgrid"><div class="fg"><label>Canal</label><select id="su-canal"><option>WhatsApp</option><option>Durante a aula</option><option>E-mail</option><option>Instagram</option><option>Outro</option></select></div>'
    +'<div class="fg"><label>Assunto</label><select id="su-cat"><option>Financeiro</option><option>Técnico</option><option>Reposição</option><option>Reclamação</option><option>Horário</option><option>Outro</option></select></div></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Descrição do pedido</label><input id="su-desc" placeholder="O que a aluna pediu ou relatou?"></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Responsável</label><select id="su-resp">'
    +EQUIPE.map(function(e){return '<option>'+e.nome+'</option>';}).join('')
    +'</select></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="salvarChamado()">Abrir chamado</button></div>';
}
function salvarChamado(){
  var desc=(document.getElementById('su-desc').value||'').trim();
  if(!desc){showToast('Descreva o pedido da aluna.');return;}
  var t={id:uuid(),alunoId:document.getElementById('su-aluna').value,
    data:document.getElementById('su-data').value||hojeISO(),
    canal:document.getElementById('su-canal').value,categoria:document.getElementById('su-cat').value,
    descricao:desc,responsavel:document.getElementById('su-resp').value,
    status:'aberto',resolucao:'',dataResolucao:null,criadorNome:S.userName};
  SUPORTE.unshift(t);salvarSuporteDB(t);closeModal();showToast('Chamado aberto! 🎫');
  buildNav();goPage('suporte');
}
function mudarStatusChamado(id,status){
  var t=SUPORTE.find(function(x){return x.id===id;});
  if(!t)return;
  t.status=status;salvarSuporteDB(t);buildNav();goPage('suporte');
}
function mResolverChamado(id){
  var t=SUPORTE.find(function(x){return x.id===id;});
  if(!t)return '';
  var al=getAluno(t.alunoId);
  return '<div class="mhdr"><h2>Resolver chamado — '+al.nome+'</h2><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div style="font-size:12px;color:var(--crose);margin-bottom:10px">'+t.categoria+': '+t.descricao+'</div>'
    +'<div class="fg" style="margin-bottom:10px"><label>O que foi feito para resolver?</label><input id="su-resol" placeholder="Ex: reposição agendada para dia 20"></div>'
    +'<div class="mftr"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-primary" onclick="confirmarResolucao(\''+id+'\')">Marcar como resolvido</button></div>';
}
function confirmarResolucao(id){
  var t=SUPORTE.find(function(x){return x.id===id;});
  if(!t)return;
  t.status='resolvido';
  t.resolucao=(document.getElementById('su-resol').value||'').trim();
  t.dataResolucao=hojeISO();
  salvarSuporteDB(t);closeModal();showToast('Chamado resolvido! ✅');
  buildNav();goPage('suporte');
}

// ══════════════════════════════════════════════════════
// CONTATOS DE COBRANÇA
// ══════════════════════════════════════════════════════
function renderCobranca(c,a){
  a.innerHTML='<button class="btn btn-primary btn-sm" onclick="openModal(mNovoContatoCobranca())"><i class="ti ti-plus"></i> Novo contato</button>';
  atualizarDiasInadimplente();
  var mesAtual=hojeISO().slice(0,7);
  var doMes=COBRANCA.filter(function(t){return (t.data||'').slice(0,7)===mesAtual;});
  // Último contato por aluna
  var porAluna={};
  COBRANCA.slice().sort(function(x,y){return (x.data||'').localeCompare(y.data||'');}).forEach(function(t){
    if(!porAluna[t.alunoId])porAluna[t.alunoId]=[];
    porAluna[t.alunoId].push(t);
  });
  var semResposta=Object.keys(porAluna).filter(function(id){
    var ult=porAluna[id][porAluna[id].length-1];
    var al=getAluno(id);
    return ult.retorno==='Sem resposta'&&al.fin==='Atrasado';
  }).length;
  var promessas=Object.keys(porAluna).filter(function(id){
    var ult=porAluna[id][porAluna[id].length-1];
    var al=getAluno(id);
    return ult.retorno==='Prometeu pagar'&&al.fin==='Atrasado';
  }).length;
  var retEmoji={'Prometeu pagar':'🤝','Pediu parcelamento':'📆','Contestou':'⚖️','Sem resposta':'🔇','Pagou':'✅','Outro':'💬'};
  var alunaIds=Object.keys(porAluna).sort(function(x,y){
    var ux=porAluna[x][porAluna[x].length-1].data||'';
    var uy=porAluna[y][porAluna[y].length-1].data||'';
    return uy.localeCompare(ux);
  });
  c.innerHTML='<div class="sg g3">'
    +'<div class="sc"><div class="sl">Contatos este mês</div><div class="sv">'+doMes.length+'</div></div>'
    +'<div class="sc '+(semResposta?'warn':'ok')+'"><div class="sl">Inadimplentes sem resposta</div><div class="sv">'+semResposta+'</div></div>'
    +'<div class="sc '+(promessas?'warn':'ok')+'"><div class="sl">Promessas em aberto</div><div class="sv">'+promessas+'</div></div>'
    +'</div>'
    +(alunaIds.length?alunaIds.map(function(id){
      var al=getAluno(id);
      var contatos=porAluna[id].slice().reverse();
      var inadBdg=al.fin==='Atrasado'?'<span style="font-size:10px;background:#fee2e2;color:#991b1b;border-radius:4px;padding:1px 6px;margin-left:6px">'+(al.diasInadimplente||0)+'d em atraso · R$ '+al.valor+'</span>'
        :al.fin==='Pago'?'<span style="font-size:10px;background:#dcfce7;color:#166534;border-radius:4px;padding:1px 6px;margin-left:6px">Pago ✅</span>':'';
      return '<div class="card" style="margin-bottom:12px"><div class="ch"><i class="ti ti-user"></i>'
        +'<h3><span class="nm" data-alid="'+al.id+'" style="cursor:pointer">'+al.nome+'</span>'+inadBdg+'</h3></div>'
        +'<div style="padding:0 16px 12px">'
        +contatos.map(function(t){
          return '<div class="timeline-item">'
            +'<div style="font-size:11px;color:var(--crose)">'+fmtDateBr(t.data)+' · '+t.canal+' · por '+(t.criadorNome||'—')+'</div>'
            +'<div style="font-size:12px;color:var(--cd);margin-top:2px">'+t.resumo+'</div>'

<script>
// ══════════════════════════════════════════════════════
// RELATÓRIOS À DIRETORIA
// ══════════════════════════════════════════════════════
var RELATORIOS=[];
var PAGAMENTOS=[];
var TIPOS_REL=[['diario','📅 Diário'],['semanal','🗓 Semanal'],['mensal','📆 Mensal'],['trimestral','📊 Trimestral'],['semestral','📈 Semestral'],['anual','🏆 Anual']];
var AREAS_REL={financeiro:'Financeiro',comercial:'Comercial',pedagogico:'Pedagógico'};

function tipoRelLbl(t){var f=TIPOS_REL.find(function(x){return x[0]===t;});return f?f[1]:t;}
function inicioPeriodo(tipo){
  var h=new Date();
  if(tipo==='diario')return hojeISO();
  if(tipo==='semanal'){var d=new Date(h-6*24*60*60*1000);return d.toISOString().split('T')[0];}
  if(tipo==='mensal')return hojeISO().slice(0,8)+'01';
  if(tipo==='trimestral'){var d3=new Date(h.getFullYear(),h.getMonth()-2,1);return d3.toISOString().split('T')[0];}
  if(tipo==='semestral'){var d6=new Date(h.getFullYear(),h.getMonth()-5,1);return d6.toISOString().split('T')[0];}
  return h.getFullYear()+'-01-01';
}

// ── Navegação ──
NAVS.financeiro.push({s:'Diretoria'},{id:'emitir',l:'Relatório à Diretoria',ic:'ti-send'});
NAVS.comercial.push({s:'Diretoria'},{id:'emitir',l:'Relatório à Diretoria',ic:'ti-send'});
NAVS.pedagogico.push({s:'Diretoria'},{id:'emitir',l:'Relatório à Diretoria',ic:'ti-send'});
NAVS.gestao.push({s:'Relatórios da Equipe'},
  {id:'relatorios-rec',l:'Relatórios Recebidos',ic:'ti-inbox',n:function(){return RELATORIOS.filter(function(r){return !r.lido;}).length;}});
TITLES.emitir='Relatório à Diretoria';
TITLES['relatorios-rec']='Relatórios Recebidos';

// ── Supabase ──
function mapRelatorio(r){
  return {id:r.id,area:r.area||'',tipo:r.tipo||'diario',data:r.data||'',
    resumoAuto:r.resumo_auto||'',destaques:r.destaques||'',problemas:r.problemas||'',
    observacoes:r.observacoes||'',criadorNome:r.criador_nome||'',lido:!!r.lido};
}
async function salvarRelatorioDB(t){
  if(!sb)return;
  try{
    var p={area:t.area,tipo:t.tipo,data:t.data,resumo_auto:t.resumoAuto||'',
      destaques:t.destaques||'',problemas:t.problemas||'',observacoes:t.observacoes||'',
      criador_nome:t.criadorNome||'',lido:!!t.lido};
    if(t.id&&String(t.id).length===36)p.id=t.id;
    var r=await sb.from('relatorios').upsert(p,{onConflict:'id'});
    if(r.error)console.warn('Erro salvar relatorio:',r.error.message);
  }catch(e){console.warn('salvarRelatorioDB:',e);}
}

// ── Registro de pagamentos com data ──
function registrarPagamento(al){
  al.finCiclo=hojeISO().slice(0,7); // carimba o mês do pagamento
  // Evita duplicar se já registrou pagamento dessa aluna hoje
  if(PAGAMENTOS.some(function(p){return p.alunoId===al.id&&p.data===hojeISO();}))return;
  var p={id:uuid(),alunoId:al.id,valor:parseFloat(al.valor||0),data:hojeISO()};
  PAGAMENTOS.unshift(p);
  if(sb){
    sb.from('pagamentos').insert({id:p.id,aluno_id:p.alunoId,valor:p.valor,data:p.data})
      .then(function(r){if(r.error)console.warn('Erro salvar pagamento:',r.error.message);});
  }
}
function estornarPagamentoHoje(alunoId){
  var idx=PAGAMENTOS.findIndex(function(p){return p.alunoId===alunoId&&p.data===hojeISO();});
  if(idx<0)return;
  var p=PAGAMENTOS[idx];
  PAGAMENTOS.splice(idx,1);
  if(sb){
    sb.from('pagamentos').delete().eq('id',p.id)
      .then(function(r){if(r.error)console.warn('Erro estornar pagamento:',r.error.message);});
  }
}

// ── Virada de mês financeira ──
// Um "Pago" só vale para o mês em que foi marcado (fin_ciclo).
// Ao abrir a plataforma em um mês novo, quem estava Pago volta para Pendente.
function virarMesFinanceiro(){
  var mes=hojeISO().slice(0,7);
  var mudou=0;
  ALUNOS.forEach(function(al){
    if(al.fin!=='Pago')return;
    var ciclo=al.finCiclo||'';
    if(ciclo===mes)return; // pago neste mês, mantém
    if(!ciclo){
      // Legado (antes desta atualização): se há pagamento registrado neste mês, mantém
      var pagouEsteMes=PAGAMENTOS.some(function(p){return p.alunoId===al.id&&(p.data||'').slice(0,7)===mes;});
      if(pagouEsteMes){al.finCiclo=mes;salvarAlunaDB(al);return;}
    }
    al.fin='Pendente';
    al.finCiclo='';
    salvarAlunaDB(al);
    mudou++;
  });
  if(mudou>0){
    console.log('Virada de mês: '+mudou+' alunas voltaram para Pendente.');
    setTimeout(function(){showToast('🗓 Novo mês: '+mudou+' aluna'+(mudou===1?'':'s')+' voltaram para Pendente no financeiro.');},1200);
  }
}

// ── Resumo automático por área ──
function resumoAutoRelatorio(area,tipo){
  var ini=inicioPeriodo(tipo);
  var linhas=[];
  atualizarDiasInadimplente();
  if(area==='financeiro'){
    var pagantes=ALUNOS.filter(isPagante);
    var pgtos=PAGAMENTOS.filter(function(p){return (p.data||'')>=ini;});
    var recebido=pgtos.reduce(function(s,p){return s+(p.valor||0);},0);
    var previsto=pagantes.filter(function(a){return a.status!=='Desaparecido';}).reduce(function(s,a){return s+a.valor;},0);
    var inad=pagantes.filter(function(a){return a.fin==='Atrasado';});
    var inadValor=inad.reduce(function(s,a){return s+a.valor;},0);
    var negat=inad.filter(function(a){return (a.diasInadimplente||0)>10;});
    var contatos=COBRANCA.filter(function(t){return (t.data||'')>=ini;});
    linhas.push('💰 Recebido no período: R$ '+recebido.toLocaleString('pt-BR')+' ('+pgtos.length+' pagamento'+(pgtos.length===1?'':'s')+')');
    linhas.push('📈 Previsto no mês (MRR): R$ '+previsto.toLocaleString('pt-BR'));
    linhas.push('⚠️ Inadimplentes: '+inad.length+' aluna'+(inad.length===1?'':'s')+' (R$ '+inadValor.toLocaleString('pt-BR')+')');
    linhas.push('🚫 Para negativar (10d+): '+negat.length);
    linhas.push('📞 Contatos de cobrança no período: '+contatos.length);
  } else if(area==='comercial'){
    var novos=LEADS.filter(function(l){return (l.data||'')>=ini;});
    var etapas={lead:0,contato:0,experimental:0,proposta:0,matriculado:0,perdido:0};
    LEADS.forEach(function(l){if(etapas[l.etapa]!==undefined)etapas[l.etapa]++;});
    var chAbertos=SUPORTE.filter(function(t){return t.status!=='resolvido';});
    linhas.push('🎯 Leads novos no período: '+novos.length+' (total no funil: '+LEADS.length+')');
    linhas.push('📋 Funil: '+etapas.contato+' em contato · '+etapas.experimental+' experimental · '+etapas.proposta+' proposta');
    linhas.push('✅ Matriculados (total): '+etapas.matriculado+' · ❌ Perdidos: '+etapas.perdido);
    linhas.push('🎫 Chamados de suporte em aberto: '+chAbertos.length);
  } else if(area==='pedagogico'){
    var aulas=AULAS.filter(function(r){return (r.data||'')>=ini;});
    var faltas=aulas.filter(function(r){return r.presenca!=='Presente';});
    var emRisco=ALUNOS.filter(function(al){return al.status==='Desaparecido'||al.status==='Atenção'||al.freq<85||(al.faltas||0)>=2||al.fin==='Atrasado'||al.risco!=='low';});
    var checkins=EXPERIENCIA.filter(function(e){return e.tipo==='checkin'&&(e.data||'')>=ini;});
    var desanimadas=ALUNOS.filter(function(al){
      if(al.status!=='Ativo')return false;
      var u=ultimoRegistro(al.id,'checkin');
      return u&&u.humor==='desanimada';
    });
    linhas.push('📖 Aulas registradas no período: '+aulas.length);
    linhas.push('🚷 Faltas no período: '+faltas.length);
    linhas.push('❤️ Alunas em risco: '+emRisco.length+' · 😟 Desanimadas: '+desanimadas.length);
    linhas.push('💚 Check-ins de experiência no período: '+checkins.length);
  }
  return linhas.join('\n');
}

// ── Emitir (perfis financeiro / comercial / pedagógico) ──
function renderEmitirRelatorio(c,a){
  var area=AREAS_REL[S.perfil];
  if(!area){c.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--crose)">Disponível apenas para os perfis das áreas.</div>';return;}
  var meus=RELATORIOS.filter(function(r){return r.area===S.perfil;})
    .sort(function(x,y){return (y.data||'').localeCompare(x.data||'');});
  var jaHoje=meus.some(function(r){return r.tipo==='diario'&&r.data===hojeISO();});
  c.innerHTML='<div class="card" style="margin-bottom:16px"><div class="ch"><i class="ti ti-send"></i><h3>Emitir relatório — '+area+'</h3></div>'
    +'<div style="padding:0 16px 16px">'
    +(jaHoje?'<div style="background:#dcfce7;color:#166534;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;margin-bottom:10px">✅ Relatório diário de hoje já emitido!</div>':'')
    +'<div class="fg" style="margin-bottom:10px"><label>Tipo de relatório</label><select id="rel-tipo" onchange="atualizarResumoRel()">'
    +TIPOS_REL.map(function(t){return '<option value="'+t[0]+'">'+t[1]+'</option>';}).join('')+'</select></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>Números do período (preenchido pela plataforma)</label>'
    +'<div id="rel-resumo" style="background:rgba(121,20,40,.04);border-radius:8px;padding:12px;font-size:12px;color:var(--cd);white-space:pre-line">'+resumoAutoRelatorio(S.perfil,'diario')+'</div></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>✨ Destaques do período</label><input id="rel-dest" placeholder="O que foi bem?"></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>⚠️ Problemas / pontos de atenção</label><input id="rel-prob" placeholder="O que precisa de atenção da diretoria?"></div>'
    +'<div class="fg" style="margin-bottom:10px"><label>📝 Observações</label><input id="rel-obs" placeholder="Algo mais? (opcional)"></div>'
    +'<button class="btn btn-primary" onclick="enviarRelatorio()"><i class="ti ti-send"></i> Emitir relatório à diretoria</button>'
    +'</div></div>'
    +'<div class="card"><div class="ch"><i class="ti ti-history"></i><h3>Meus relatórios emitidos ('+meus.length+')</h3></div>'
    +(meus.length?'<table class="tbl"><tr><th>Data</th><th>Tipo</th><th>Status</th></tr>'
      +meus.slice(0,15).map(function(r){
        return '<tr><td style="font-size:12px">'+fmtDateBr(r.data)+'</td><td style="font-size:12px">'+tipoRelLbl(r.tipo)+'</td>'
          +'<td>'+(r.lido?'<span style="font-size:11px;background:#dcfce7;color:#166534;border-radius:6px;padding:2px 8px;font-weight:700">👁 Lido pela diretoria</span>'
            :'<span style="font-size:11px;background:#fef9c3;color:#854d0e;border-radius:6px;padding:2px 8px;font-weight:700">📬 Enviado</span>')+'</td></tr>';
      }).join('')+'</table>'
      :'<div style="text-align:center;padding:30px;color:var(--crose)">Nenhum relatório emitido ainda.</div>')+'</div>';
}
function atualizarResumoRel(){
  var t=document.getElementById('rel-tipo');
  var box=document.getElementById('rel-resumo');
  if(t&&box)box.textContent=resumoAutoRelatorio(S.perfil,t.value);
}
function enviarRelatorio(){
  var tipo=document.getElementById('rel-tipo').value;
  var r={id:uuid(),area:S.perfil,tipo:tipo,data:hojeISO(),
    resumoAuto:resumoAutoRelatorio(S.perfil,tipo),
    destaques:(document.getElementById('rel-dest').value||'').trim(),
    problemas:(document.getElementById('rel-prob').value||'').trim(),
    observacoes:(document.getElementById('rel-obs').value||'').trim(),
    criadorNome:S.userName,lido:false};
  RELATORIOS.unshift(r);salvarRelatorioDB(r);
  showToast('Relatório '+tipoRelLbl(tipo).replace(/^\S+ /,'')+' emitido! 📬');
  goPage('emitir');
}

// ── Recebidos (perfil gestão) ──
var _relFiltroTipo='todos';
function renderRelatoriosRecebidos(c,a){
  var faltando=Object.keys(AREAS_REL).filter(function(ar){
    return !RELATORIOS.some(function(r){return r.area===ar&&r.tipo==='diario'&&r.data===hojeISO();});
  });
  var lista=RELATORIOS.slice().sort(function(x,y){return (y.data||'').localeCompare(x.data||'');});
  if(_relFiltroTipo!=='todos')lista=lista.filter(function(r){return r.tipo===_relFiltroTipo;});
  var naoLidos=RELATORIOS.filter(function(r){return !r.lido;}).length;
  c.innerHTML='<div class="sg g3">'
    +'<div class="sc"><div class="sl">Recebidos</div><div class="sv">'+RELATORIOS.length+'</div></div>'
    +'<div class="sc '+(naoLidos?'warn':'ok')+'"><div class="sl">Não lidos</div><div class="sv">'+naoLidos+'</div></div>'
    +'<div class="sc '+(faltando.length?'warn':'ok')+'"><div class="sl">Diários pendentes hoje</div><div class="sv">'+faltando.length+'</div></div>'
    +'</div>'
    +(faltando.length?'<div class="card warn" style="margin-bottom:12px"><div style="padding:12px 16px;font-size:12px;font-weight:700;color:#854d0e">⏳ Faltando o relatório diário de hoje: '+faltando.map(function(ar){return AREAS_REL[ar];}).join(', ')+'</div></div>':'')
    +'<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'
    +[['todos','Todos']].concat(TIPOS_REL).map(function(f){
      return '<button class="btn btn-sm '+(_relFiltroTipo===f[0]?'btn-primary':'btn-ghost')+'" onclick="_relFiltroTipo=\''+f[0]+'\';goPage(\'relatorios-rec\')">'+f[1]+'</button>';
    }).join('')+'</div>'
    +(lista.length?lista.map(function(r){
      return '<div class="card" style="margin-bottom:12px'+(r.lido?'':';border:2px solid rgba(121,20,40,.35)')+'">'
        +'<div class="ch"><i class="ti ti-file-text"></i><h3>'+AREAS_REL[r.area]+' — '+tipoRelLbl(r.tipo)+'</h3>'
        +'<button class="cha" onclick="marcarRelLido(\''+r.id+'\')">'+(r.lido?'Marcar como não lido':'✔ Marcar como lido')+'</button></div>'
        +'<div style="padding:0 16px 14px">'
        +'<div style="font-size:11px;color:var(--crose);margin-bottom:8px">'+fmtDateBr(r.data)+' · emitido por '+(r.criadorNome||'—')+(r.lido?' · 👁 lido':' · 📬 <b>novo</b>')+'</div>'
        +'<div style="background:rgba(121,20,40,.04);border-radius:8px;padding:10px;font-size:12px;color:var(--cd);white-space:pre-line;margin-bottom:8px">'+r.resumoAuto+'</div>'
        +(r.destaques?'<div style="font-size:12px;margin-bottom:4px">✨ <b>Destaques:</b> '+r.destaques+'</div>':'')
        +(r.problemas?'<div style="font-size:12px;margin-bottom:4px;color:#991b1b">⚠️ <b>Problemas:</b> '+r.problemas+'</div>':'')
        +(r.observacoes?'<div style="font-size:12px;color:var(--crose)">📝 '+r.observacoes+'</div>':'')
        +'</div></div>';
    }).join('')
    :'<div class="card" style="text-align:center;padding:40px;color:var(--crose)">Nenhum relatório nesse filtro ainda.</div>');
}
function marcarRelLido(id){
  var r=RELATORIOS.find(function(x){return x.id===id;});
  if(!r)return;
  r.lido=!r.lido;salvarRelatorioDB(r);buildNav();goPage('relatorios-rec');
}

// ── Dashboard da gestão: relatórios recebidos hoje ──
var _origRenderDashboard2=renderDashboard;
renderDashboard=function(c,a){
  _origRenderDashboard2(c,a);
  if(S.perfil!=='gestao')return;
  var hoje=hojeISO();
  var deHoje=RELATORIOS.filter(function(r){return r.data===hoje;});
  var chips=Object.keys(AREAS_REL).map(function(ar){
    var enviado=RELATORIOS.some(function(r){return r.area===ar&&r.tipo==='diario'&&r.data===hoje;});
    return '<div class="sc '+(enviado?'ok':'warn')+'" style="cursor:pointer" onclick="goPage(\'relatorios-rec\')">'
      +'<div class="sl">'+AREAS_REL[ar]+'</div>'
      +'<div style="font-size:14px;font-weight:700;margin-top:4px;color:'+(enviado?'#16a34a':'#854d0e')+'">'+(enviado?'✅ Recebido':'⏳ Pendente')+'</div></div>';
  }).join('');
  c.insertAdjacentHTML('beforeend',
    '<div class="card" style="margin-top:16px"><div class="ch"><i class="ti ti-inbox"></i><h3>📬 Relatórios de hoje</h3>'
    +'<button class="cha" onclick="goPage(\'relatorios-rec\')">Ver todos →</button></div>'
    +'<div class="sg g3" style="padding:0 16px 12px">'+chips+'</div>'
    +(deHoje.length?'<div style="padding:0 16px 14px">'
      +deHoje.map(function(r){
        return '<div style="padding:8px 12px;background:rgba(121,20,40,.03);border-radius:9px;margin-bottom:6px;cursor:pointer" onclick="goPage(\'relatorios-rec\')">'
          +'<span style="font-size:12px;font-weight:700;color:var(--cd)">'+AREAS_REL[r.area]+' — '+tipoRelLbl(r.tipo)+'</span>'
          +'<span style="font-size:11px;color:var(--crose)"> · por '+(r.criadorNome||'—')+(r.lido?' · 👁':' · 📬 novo')+'</span>'
          +(r.problemas?'<div style="font-size:11px;color:#991b1b;margin-top:2px">⚠️ '+r.problemas+'</div>':'')
          +'</div>';
      }).join('')+'</div>':'')
    +'</div>');
};
</script>
